<!DOCTYPE html>
<html>
<head>
  <title>WebGPU GEMM - Compute Only Timing</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.22.0/dist/tf-backend-webgpu.min.js"></script>
</head>
<body>
  <h1>WebGPU GEMM - Compute Only</h1>
  <p>Measuring compute time without readback overhead</p>
  <pre id="output">Click the button to run benchmark</pre>
  <button id="run">Run Benchmark</button>
  <script type="module">
    const output = document.getElementById('output');
    const log = (msg) => { output.textContent += '\n' + msg; console.log(msg); };

    // Simple scalar shader
    const gemmShader = `
      struct Uniforms { M: u32, N: u32, K: u32 }

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<f32>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;

      const TILE: u32 = 32u;
      var<workgroup> mm_Asub: array<array<f32, 32>, 32>;
      var<workgroup> mm_Bsub: array<array<f32, 32>, 32>;

      @compute @workgroup_size(8, 8)
      fn main(@builtin(local_invocation_id) localId: vec3<u32>, @builtin(workgroup_id) workgroupId: vec3<u32>) {
        let M = uniforms.M; let N = uniforms.N; let K = uniforms.K;
        let tileRow = workgroupId.y * TILE; let tileCol = workgroupId.x * TILE;
        let localRow = localId.y; let localCol = localId.x;
        let localIdx = localRow * 8u + localCol;
        let globalRow = tileRow + localRow * 4u; let globalCol = tileCol + localCol * 4u;

        var acc0 = vec4<f32>(0.0); var acc1 = vec4<f32>(0.0);
        var acc2 = vec4<f32>(0.0); var acc3 = vec4<f32>(0.0);

        let numTiles = (K + TILE - 1u) / TILE;
        for (var t: u32 = 0u; t < numTiles; t = t + 1u) {
          // Load A tile
          for (var i: u32 = 0u; i < 16u; i = i + 1u) {
            let loadIdx = localIdx + i * 64u;
            if (loadIdx < 1024u) {
              let loadRow = loadIdx / 32u; let loadCol = loadIdx % 32u;
              let aRow = tileRow + loadRow; let aCol = t * TILE + loadCol;
              if (aRow < M && aCol < K) { mm_Asub[loadRow][loadCol] = A[aRow * K + aCol]; }
              else { mm_Asub[loadRow][loadCol] = 0.0; }
            }
          }
          // Load B tile
          for (var i: u32 = 0u; i < 16u; i = i + 1u) {
            let loadIdx = localIdx + i * 64u;
            if (loadIdx < 1024u) {
              let loadRow = loadIdx / 32u; let loadCol = loadIdx % 32u;
              let bRow = t * TILE + loadRow; let bCol = tileCol + loadCol;
              if (bRow < K && bCol < N) { mm_Bsub[loadRow][loadCol] = B[bRow * N + bCol]; }
              else { mm_Bsub[loadRow][loadCol] = 0.0; }
            }
          }
          workgroupBarrier();

          let r0 = localRow * 4u; let c0 = localCol * 4u;
          for (var k: u32 = 0u; k < TILE; k = k + 1u) {
            let bVec = vec4<f32>(mm_Bsub[k][c0], mm_Bsub[k][c0+1u], mm_Bsub[k][c0+2u], mm_Bsub[k][c0+3u]);
            acc0 = fma(vec4<f32>(mm_Asub[r0][k]), bVec, acc0);
            acc1 = fma(vec4<f32>(mm_Asub[r0+1u][k]), bVec, acc1);
            acc2 = fma(vec4<f32>(mm_Asub[r0+2u][k]), bVec, acc2);
            acc3 = fma(vec4<f32>(mm_Asub[r0+3u][k]), bVec, acc3);
          }
          workgroupBarrier();
        }

        if (globalRow < M && globalCol + 3u < N) {
          C[globalRow * N + globalCol] = acc0.x;
          C[globalRow * N + globalCol + 1u] = acc0.y;
          C[globalRow * N + globalCol + 2u] = acc0.z;
          C[globalRow * N + globalCol + 3u] = acc0.w;
          C[(globalRow + 1u) * N + globalCol] = acc1.x;
          C[(globalRow + 1u) * N + globalCol + 1u] = acc1.y;
          C[(globalRow + 1u) * N + globalCol + 2u] = acc1.z;
          C[(globalRow + 1u) * N + globalCol + 3u] = acc1.w;
          C[(globalRow + 2u) * N + globalCol] = acc2.x;
          C[(globalRow + 2u) * N + globalCol + 1u] = acc2.y;
          C[(globalRow + 2u) * N + globalCol + 2u] = acc2.z;
          C[(globalRow + 2u) * N + globalCol + 3u] = acc2.w;
          C[(globalRow + 3u) * N + globalCol] = acc3.x;
          C[(globalRow + 3u) * N + globalCol + 1u] = acc3.y;
          C[(globalRow + 3u) * N + globalCol + 2u] = acc3.z;
          C[(globalRow + 3u) * N + globalCol + 3u] = acc3.w;
        }
      }
    `;

    class WebGPUMatmul {
      constructor(device) { this.device = device; }

      async init() {
        const shaderModule = this.device.createShaderModule({ code: gemmShader });
        this.bindGroupLayout = this.device.createBindGroupLayout({
          entries: [
            { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
            { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
          ]
        });
        this.pipeline = this.device.createComputePipeline({
          layout: this.device.createPipelineLayout({ bindGroupLayouts: [this.bindGroupLayout] }),
          compute: { module: shaderModule, entryPoint: 'main' }
        });
      }

      createBuffers(M, N, K) {
        const device = this.device;
        const uniformBuffer = device.createBuffer({ size: 12, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const bufferA = device.createBuffer({ size: M * K * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const bufferB = device.createBuffer({ size: K * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const bufferC = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
        const readBuffer = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
        const bindGroup = device.createBindGroup({
          layout: this.bindGroupLayout,
          entries: [
            { binding: 0, resource: { buffer: uniformBuffer } },
            { binding: 1, resource: { buffer: bufferA } },
            { binding: 2, resource: { buffer: bufferB } },
            { binding: 3, resource: { buffer: bufferC } },
          ]
        });
        return { uniformBuffer, bufferA, bufferB, bufferC, readBuffer, bindGroup };
      }

      // Compute-only: no readback
      async matmulCompute(a, b, M, N, K, buffers) {
        const device = this.device;
        device.queue.writeBuffer(buffers.uniformBuffer, 0, new Uint32Array([M, N, K]));
        device.queue.writeBuffer(buffers.bufferA, 0, a);
        device.queue.writeBuffer(buffers.bufferB, 0, b);
        const commandEncoder = device.createCommandEncoder();
        const passEncoder = commandEncoder.beginComputePass();
        passEncoder.setPipeline(this.pipeline);
        passEncoder.setBindGroup(0, buffers.bindGroup);
        passEncoder.dispatchWorkgroups(Math.ceil(N / 32), Math.ceil(M / 32));
        passEncoder.end();
        device.queue.submit([commandEncoder.finish()]);
        await device.queue.onSubmittedWorkDone();
      }

      // Full: with readback
      async matmulFull(a, b, M, N, K, buffers) {
        const device = this.device;
        device.queue.writeBuffer(buffers.uniformBuffer, 0, new Uint32Array([M, N, K]));
        device.queue.writeBuffer(buffers.bufferA, 0, a);
        device.queue.writeBuffer(buffers.bufferB, 0, b);
        const commandEncoder = device.createCommandEncoder();
        const passEncoder = commandEncoder.beginComputePass();
        passEncoder.setPipeline(this.pipeline);
        passEncoder.setBindGroup(0, buffers.bindGroup);
        passEncoder.dispatchWorkgroups(Math.ceil(N / 32), Math.ceil(M / 32));
        passEncoder.end();
        commandEncoder.copyBufferToBuffer(buffers.bufferC, 0, buffers.readBuffer, 0, M * N * 4);
        device.queue.submit([commandEncoder.finish()]);
        await buffers.readBuffer.mapAsync(GPUMapMode.READ);
        const result = new Float32Array(buffers.readBuffer.getMappedRange().slice(0));
        buffers.readBuffer.unmap();
        return result;
      }

      destroyBuffers(buffers) {
        buffers.uniformBuffer.destroy();
        buffers.bufferA.destroy();
        buffers.bufferB.destroy();
        buffers.bufferC.destroy();
        buffers.readBuffer.destroy();
      }
    }

    document.getElementById('run').onclick = async () => {
      output.textContent = 'Starting benchmark...\n';
      try {
        if (!navigator.gpu) { log('ERROR: WebGPU not supported'); return; }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { log('ERROR: No WebGPU adapter found'); return; }
        const device = await adapter.requestDevice();
        log('WebGPU device ready');

        const gpuMatmul = new WebGPUMatmul(device);
        await gpuMatmul.init();

        await tf.setBackend('webgpu');
        await tf.ready();
        log('tfjs WebGPU ready');

        const sizes = [512, 1024, 2048, 4096];
        const WARMUP = 10;
        const ITERS = 15;

        log('\n=== COMPUTE-ONLY vs FULL TIMING ===\n');
        log('Size | Ours (compute) | Ours (full) | tfjs (full)  | Ratio (full)');
        log('-----|----------------|-------------|--------------|-------------');

        for (const n of sizes) {
          const a = new Float32Array(n*n).map(() => Math.random());
          const b = new Float32Array(n*n).map(() => Math.random());
          const buffers = gpuMatmul.createBuffers(n, n, n);
          const tA = tf.tensor2d(Array.from(a), [n, n]);
          const tB = tf.tensor2d(Array.from(b), [n, n]);

          // Warmup
          for (let i = 0; i < WARMUP; i++) {
            await gpuMatmul.matmulCompute(a, b, n, n, n, buffers);
            const res = tf.matMul(tA, tB);
            await res.data();
            res.dispose();
          }

          // Compute-only timing
          const computeTimes = [];
          for (let i = 0; i < ITERS; i++) {
            const start = performance.now();
            await gpuMatmul.matmulCompute(a, b, n, n, n, buffers);
            computeTimes.push(performance.now() - start);
          }

          // Full timing (with readback)
          const fullTimes = [];
          for (let i = 0; i < ITERS; i++) {
            const start = performance.now();
            await gpuMatmul.matmulFull(a, b, n, n, n, buffers);
            fullTimes.push(performance.now() - start);
          }

          // tfjs timing
          const tfjsTimes = [];
          for (let i = 0; i < ITERS; i++) {
            const start = performance.now();
            const res = tf.matMul(tA, tB);
            await res.data();
            res.dispose();
            tfjsTimes.push(performance.now() - start);
          }

          gpuMatmul.destroyBuffers(buffers);
          tA.dispose(); tB.dispose();

          const computeMin = Math.min(...computeTimes);
          const fullMin = Math.min(...fullTimes);
          const tfjsMin = Math.min(...tfjsTimes);
          const ratio = (tfjsMin / fullMin).toFixed(2);
          const win = parseFloat(ratio) >= 0.9 ? '✓' : '';

          log(`${n.toString().padStart(4)} | ${computeMin.toFixed(1).padStart(12)}ms | ${fullMin.toFixed(1).padStart(9)}ms | ${tfjsMin.toFixed(1).padStart(10)}ms | ${ratio}x ${win}`);
        }
        log('\nDONE');
      } catch (e) { log('ERROR: ' + e.message); log(e.stack); }
    };
  </script>
</body>
</html>
