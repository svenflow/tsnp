<!DOCTYPE html>
<html>
<head>
  <title>WebGPU GEMM 16x16 Workgroup</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.22.0/dist/tf-backend-webgpu.min.js"></script>
</head>
<body>
  <h1>WebGPU GEMM - 16x16 Workgroup</h1>
  <p>256 threads, 4x4 output per thread, vec4 loads from global mem</p>
  <pre id="output">Click the button to run benchmark</pre>
  <button id="run">Run Benchmark</button>
  <script type="module">
    const output = document.getElementById('output');
    const log = (msg) => { output.textContent += '\n' + msg; console.log(msg); };

    // Try larger workgroup (16x16 = 256 threads) with smaller per-thread work
    // Tile: 64x64 output, each thread handles 4x4
    // This gives more parallelism and better latency hiding
    const gemmShader16x16 = `
      struct Uniforms {
        M: u32,
        N: u32,
        K: u32,
      }

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<vec4<f32>>;  // vec4 storage for faster loads
      @group(0) @binding(2) var<storage, read> B: array<vec4<f32>>;
      @group(0) @binding(3) var<storage, read_write> C: array<vec4<f32>>;

      // 64x64 tile, 16x16 threads = 256, 4x4 per thread
      const TS: u32 = 64u;
      const TSK: u32 = 16u;
      const WG: u32 = 16u;
      const WPT: u32 = 4u;

      // Shared memory
      var<workgroup> Asub: array<array<f32, TSK>, TS>;  // [64][16]
      var<workgroup> Bsub: array<array<f32, TS>, TSK>;  // [16][64]

      @compute @workgroup_size(16, 16)
      fn main(
        @builtin(local_invocation_id) local_id: vec3<u32>,
        @builtin(workgroup_id) workgroup_id: vec3<u32>
      ) {
        let M = uniforms.M;
        let N = uniforms.N;
        let K = uniforms.K;

        let tidx = local_id.x;
        let tidy = local_id.y;
        let tid = tidy * WG + tidx;

        let row = workgroup_id.y * TS + tidy * WPT;
        let col = workgroup_id.x * TS + tidx * WPT;

        // 4x4 accumulators using vec4
        var acc0: vec4<f32> = vec4<f32>(0.0);
        var acc1: vec4<f32> = vec4<f32>(0.0);
        var acc2: vec4<f32> = vec4<f32>(0.0);
        var acc3: vec4<f32> = vec4<f32>(0.0);

        let numTiles = (K + TSK - 1u) / TSK;

        for (var t: u32 = 0u; t < numTiles; t = t + 1u) {
          // Load A: 64 rows x 16 cols = 1024 elements
          // 256 threads load 4 elements each
          // Thread tid loads row (tid / 4), cols ((tid % 4) * 4 .. + 3)
          let aLoadRow = tid / 4u;
          let aLoadCol = (tid % 4u) * 4u;
          let aGlobalRow = workgroup_id.y * TS + aLoadRow;
          let aGlobalCol = t * TSK + aLoadCol;

          if (aGlobalRow < M && aGlobalCol + 3u < K) {
            // Can do vec4 load
            let vec4Idx = (aGlobalRow * K + aGlobalCol) / 4u;
            let aVec = A[vec4Idx];
            Asub[aLoadRow][aLoadCol + 0u] = aVec.x;
            Asub[aLoadRow][aLoadCol + 1u] = aVec.y;
            Asub[aLoadRow][aLoadCol + 2u] = aVec.z;
            Asub[aLoadRow][aLoadCol + 3u] = aVec.w;
          } else {
            // Scalar fallback
            for (var i: u32 = 0u; i < 4u; i = i + 1u) {
              if (aGlobalRow < M && aGlobalCol + i < K) {
                // Need scalar load - can't use vec4 array here easily
                // This is the slow path
                Asub[aLoadRow][aLoadCol + i] = 0.0;  // TODO: fix
              } else {
                Asub[aLoadRow][aLoadCol + i] = 0.0;
              }
            }
          }

          // Load B: 16 rows x 64 cols = 1024 elements
          // Similar pattern
          let bLoadRow = tid / 16u;
          let bLoadCol = (tid % 16u) * 4u;
          let bGlobalRow = t * TSK + bLoadRow;
          let bGlobalCol = workgroup_id.x * TS + bLoadCol;

          if (bGlobalRow < K && bGlobalCol + 3u < N) {
            let vec4Idx = (bGlobalRow * N + bGlobalCol) / 4u;
            let bVec = B[vec4Idx];
            Bsub[bLoadRow][bLoadCol + 0u] = bVec.x;
            Bsub[bLoadRow][bLoadCol + 1u] = bVec.y;
            Bsub[bLoadRow][bLoadCol + 2u] = bVec.z;
            Bsub[bLoadRow][bLoadCol + 3u] = bVec.w;
          } else {
            for (var i: u32 = 0u; i < 4u; i = i + 1u) {
              Bsub[bLoadRow][bLoadCol + i] = 0.0;
            }
          }

          workgroupBarrier();

          // Compute 4x4 block - unroll by 4
          for (var k: u32 = 0u; k < TSK; k = k + 4u) {
            // k
            {
              let b = vec4<f32>(Bsub[k][tidx * WPT + 0u], Bsub[k][tidx * WPT + 1u], Bsub[k][tidx * WPT + 2u], Bsub[k][tidx * WPT + 3u]);
              acc0 = fma(vec4<f32>(Asub[tidy * WPT + 0u][k]), b, acc0);
              acc1 = fma(vec4<f32>(Asub[tidy * WPT + 1u][k]), b, acc1);
              acc2 = fma(vec4<f32>(Asub[tidy * WPT + 2u][k]), b, acc2);
              acc3 = fma(vec4<f32>(Asub[tidy * WPT + 3u][k]), b, acc3);
            }
            // k+1
            {
              let k1 = k + 1u;
              let b = vec4<f32>(Bsub[k1][tidx * WPT + 0u], Bsub[k1][tidx * WPT + 1u], Bsub[k1][tidx * WPT + 2u], Bsub[k1][tidx * WPT + 3u]);
              acc0 = fma(vec4<f32>(Asub[tidy * WPT + 0u][k1]), b, acc0);
              acc1 = fma(vec4<f32>(Asub[tidy * WPT + 1u][k1]), b, acc1);
              acc2 = fma(vec4<f32>(Asub[tidy * WPT + 2u][k1]), b, acc2);
              acc3 = fma(vec4<f32>(Asub[tidy * WPT + 3u][k1]), b, acc3);
            }
            // k+2
            {
              let k2 = k + 2u;
              let b = vec4<f32>(Bsub[k2][tidx * WPT + 0u], Bsub[k2][tidx * WPT + 1u], Bsub[k2][tidx * WPT + 2u], Bsub[k2][tidx * WPT + 3u]);
              acc0 = fma(vec4<f32>(Asub[tidy * WPT + 0u][k2]), b, acc0);
              acc1 = fma(vec4<f32>(Asub[tidy * WPT + 1u][k2]), b, acc1);
              acc2 = fma(vec4<f32>(Asub[tidy * WPT + 2u][k2]), b, acc2);
              acc3 = fma(vec4<f32>(Asub[tidy * WPT + 3u][k2]), b, acc3);
            }
            // k+3
            {
              let k3 = k + 3u;
              let b = vec4<f32>(Bsub[k3][tidx * WPT + 0u], Bsub[k3][tidx * WPT + 1u], Bsub[k3][tidx * WPT + 2u], Bsub[k3][tidx * WPT + 3u]);
              acc0 = fma(vec4<f32>(Asub[tidy * WPT + 0u][k3]), b, acc0);
              acc1 = fma(vec4<f32>(Asub[tidy * WPT + 1u][k3]), b, acc1);
              acc2 = fma(vec4<f32>(Asub[tidy * WPT + 2u][k3]), b, acc2);
              acc3 = fma(vec4<f32>(Asub[tidy * WPT + 3u][k3]), b, acc3);
            }
          }

          workgroupBarrier();
        }

        // Write 4x4 output as vec4s
        if (row + 0u < M) {
          let idx0 = ((row + 0u) * N + col) / 4u;
          C[idx0] = acc0;
        }
        if (row + 1u < M) {
          let idx1 = ((row + 1u) * N + col) / 4u;
          C[idx1] = acc1;
        }
        if (row + 2u < M) {
          let idx2 = ((row + 2u) * N + col) / 4u;
          C[idx2] = acc2;
        }
        if (row + 3u < M) {
          let idx3 = ((row + 3u) * N + col) / 4u;
          C[idx3] = acc3;
        }
      }
    `;

    // Simpler version without vec4 storage - just f32
    const gemmShader16x16Simple = `
      struct Uniforms {
        M: u32,
        N: u32,
        K: u32,
      }

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<f32>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;

      const TS: u32 = 64u;
      const TSK: u32 = 16u;
      const WG: u32 = 16u;
      const WPT: u32 = 4u;

      var<workgroup> Asub: array<array<f32, TSK>, TS>;
      var<workgroup> Bsub: array<array<f32, TS>, TSK>;

      @compute @workgroup_size(16, 16)
      fn main(
        @builtin(local_invocation_id) local_id: vec3<u32>,
        @builtin(workgroup_id) workgroup_id: vec3<u32>
      ) {
        let M = uniforms.M;
        let N = uniforms.N;
        let K = uniforms.K;

        let tidx = local_id.x;
        let tidy = local_id.y;
        let tid = tidy * WG + tidx;

        let row = workgroup_id.y * TS + tidy * WPT;
        let col = workgroup_id.x * TS + tidx * WPT;

        var acc0: vec4<f32> = vec4<f32>(0.0);
        var acc1: vec4<f32> = vec4<f32>(0.0);
        var acc2: vec4<f32> = vec4<f32>(0.0);
        var acc3: vec4<f32> = vec4<f32>(0.0);

        let numTiles = (K + TSK - 1u) / TSK;

        for (var t: u32 = 0u; t < numTiles; t = t + 1u) {
          // 256 threads loading 1024 elements = 4 each
          // A: each thread loads 4 consecutive elements from one row
          let aLoadRow = tid / 4u;  // 0..63
          let aLoadColBase = (tid % 4u) * 4u;  // 0, 4, 8, 12
          let aGlobalRow = workgroup_id.y * TS + aLoadRow;

          for (var i: u32 = 0u; i < 4u; i = i + 1u) {
            let aGlobalCol = t * TSK + aLoadColBase + i;
            if (aGlobalRow < M && aGlobalCol < K) {
              Asub[aLoadRow][aLoadColBase + i] = A[aGlobalRow * K + aGlobalCol];
            } else {
              Asub[aLoadRow][aLoadColBase + i] = 0.0;
            }
          }

          // B: each thread loads 4 consecutive elements from one row
          let bLoadRow = tid / 16u;  // 0..15
          let bLoadColBase = (tid % 16u) * 4u;  // 0, 4, 8, ... 60
          let bGlobalRow = t * TSK + bLoadRow;

          for (var i: u32 = 0u; i < 4u; i = i + 1u) {
            let bGlobalCol = workgroup_id.x * TS + bLoadColBase + i;
            if (bGlobalRow < K && bGlobalCol < N) {
              Bsub[bLoadRow][bLoadColBase + i] = B[bGlobalRow * N + bGlobalCol];
            } else {
              Bsub[bLoadRow][bLoadColBase + i] = 0.0;
            }
          }

          workgroupBarrier();

          // Compute
          for (var k: u32 = 0u; k < TSK; k = k + 1u) {
            let b = vec4<f32>(
              Bsub[k][tidx * WPT + 0u],
              Bsub[k][tidx * WPT + 1u],
              Bsub[k][tidx * WPT + 2u],
              Bsub[k][tidx * WPT + 3u]
            );
            acc0 = fma(vec4<f32>(Asub[tidy * WPT + 0u][k]), b, acc0);
            acc1 = fma(vec4<f32>(Asub[tidy * WPT + 1u][k]), b, acc1);
            acc2 = fma(vec4<f32>(Asub[tidy * WPT + 2u][k]), b, acc2);
            acc3 = fma(vec4<f32>(Asub[tidy * WPT + 3u][k]), b, acc3);
          }

          workgroupBarrier();
        }

        // Write
        for (var i: u32 = 0u; i < 4u; i = i + 1u) {
          let outRow = row + i;
          if (outRow < M) {
            if (col + 0u < N) { C[outRow * N + col + 0u] = select(acc1, select(acc2, select(acc3, acc0, i == 0u), i == 1u), i == 2u).x; }
          }
        }
        // Simplified write - one at a time
        if (row + 0u < M && col + 0u < N) { C[(row + 0u) * N + col + 0u] = acc0.x; }
        if (row + 0u < M && col + 1u < N) { C[(row + 0u) * N + col + 1u] = acc0.y; }
        if (row + 0u < M && col + 2u < N) { C[(row + 0u) * N + col + 2u] = acc0.z; }
        if (row + 0u < M && col + 3u < N) { C[(row + 0u) * N + col + 3u] = acc0.w; }
        if (row + 1u < M && col + 0u < N) { C[(row + 1u) * N + col + 0u] = acc1.x; }
        if (row + 1u < M && col + 1u < N) { C[(row + 1u) * N + col + 1u] = acc1.y; }
        if (row + 1u < M && col + 2u < N) { C[(row + 1u) * N + col + 2u] = acc1.z; }
        if (row + 1u < M && col + 3u < N) { C[(row + 1u) * N + col + 3u] = acc1.w; }
        if (row + 2u < M && col + 0u < N) { C[(row + 2u) * N + col + 0u] = acc2.x; }
        if (row + 2u < M && col + 1u < N) { C[(row + 2u) * N + col + 1u] = acc2.y; }
        if (row + 2u < M && col + 2u < N) { C[(row + 2u) * N + col + 2u] = acc2.z; }
        if (row + 2u < M && col + 3u < N) { C[(row + 2u) * N + col + 3u] = acc2.w; }
        if (row + 3u < M && col + 0u < N) { C[(row + 3u) * N + col + 0u] = acc3.x; }
        if (row + 3u < M && col + 1u < N) { C[(row + 3u) * N + col + 1u] = acc3.y; }
        if (row + 3u < M && col + 2u < N) { C[(row + 3u) * N + col + 2u] = acc3.z; }
        if (row + 3u < M && col + 3u < N) { C[(row + 3u) * N + col + 3u] = acc3.w; }
      }
    `;

    class WebGPUMatmul {
      constructor(device) {
        this.device = device;
        this.pipeline = null;
        this.bindGroupLayout = null;
      }

      async init() {
        const shaderModule = this.device.createShaderModule({ code: gemmShader16x16Simple });
        this.bindGroupLayout = this.device.createBindGroupLayout({
          entries: [
            { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
            { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
          ]
        });
        this.pipeline = this.device.createComputePipeline({
          layout: this.device.createPipelineLayout({ bindGroupLayouts: [this.bindGroupLayout] }),
          compute: { module: shaderModule, entryPoint: 'main' }
        });
      }

      createBuffers(M, N, K) {
        const device = this.device;
        const uniformBuffer = device.createBuffer({ size: 12, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const bufferA = device.createBuffer({ size: M * K * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const bufferB = device.createBuffer({ size: K * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const bufferC = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
        const readBuffer = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
        const bindGroup = device.createBindGroup({
          layout: this.bindGroupLayout,
          entries: [
            { binding: 0, resource: { buffer: uniformBuffer } },
            { binding: 1, resource: { buffer: bufferA } },
            { binding: 2, resource: { buffer: bufferB } },
            { binding: 3, resource: { buffer: bufferC } },
          ]
        });
        return { uniformBuffer, bufferA, bufferB, bufferC, readBuffer, bindGroup };
      }

      async matmulReuse(a, b, M, N, K, buffers) {
        const device = this.device;
        device.queue.writeBuffer(buffers.uniformBuffer, 0, new Uint32Array([M, N, K]));
        device.queue.writeBuffer(buffers.bufferA, 0, a);
        device.queue.writeBuffer(buffers.bufferB, 0, b);
        const TS = 64;
        const commandEncoder = device.createCommandEncoder();
        const passEncoder = commandEncoder.beginComputePass();
        passEncoder.setPipeline(this.pipeline);
        passEncoder.setBindGroup(0, buffers.bindGroup);
        passEncoder.dispatchWorkgroups(Math.ceil(N / TS), Math.ceil(M / TS));
        passEncoder.end();
        commandEncoder.copyBufferToBuffer(buffers.bufferC, 0, buffers.readBuffer, 0, M * N * 4);
        device.queue.submit([commandEncoder.finish()]);
        await buffers.readBuffer.mapAsync(GPUMapMode.READ);
        const result = new Float32Array(buffers.readBuffer.getMappedRange().slice(0));
        buffers.readBuffer.unmap();
        return result;
      }

      destroyBuffers(buffers) {
        buffers.uniformBuffer.destroy();
        buffers.bufferA.destroy();
        buffers.bufferB.destroy();
        buffers.bufferC.destroy();
        buffers.readBuffer.destroy();
      }
    }

    function cpuMatmul(a, b, M, N, K) {
      const c = new Float32Array(M * N);
      for (let i = 0; i < M; i++) {
        for (let j = 0; j < N; j++) {
          let sum = 0;
          for (let k = 0; k < K; k++) { sum += a[i * K + k] * b[k * N + j]; }
          c[i * N + j] = sum;
        }
      }
      return c;
    }

    function maxAbsDiff(a, b) {
      let max = 0;
      for (let i = 0; i < a.length; i++) { max = Math.max(max, Math.abs(a[i] - b[i])); }
      return max;
    }

    document.getElementById('run').onclick = async () => {
      output.textContent = 'Starting benchmark...\n';
      try {
        if (!navigator.gpu) { log('ERROR: WebGPU not supported'); return; }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { log('ERROR: No WebGPU adapter found'); return; }
        const device = await adapter.requestDevice();
        log('WebGPU device ready');

        const gpuMatmul = new WebGPUMatmul(device);
        await gpuMatmul.init();
        log('16x16 workgroup GEMM kernel ready');

        log('\nVerifying correctness...');
        const testN = 64;
        const testA = new Float32Array(testN * testN).map(() => Math.random());
        const testB = new Float32Array(testN * testN).map(() => Math.random());
        const testBuffers = gpuMatmul.createBuffers(testN, testN, testN);
        const gpuResult = await gpuMatmul.matmulReuse(testA, testB, testN, testN, testN, testBuffers);
        const cpuResult = cpuMatmul(testA, testB, testN, testN, testN);
        const diff = maxAbsDiff(gpuResult, cpuResult);
        log('Max abs diff from CPU: ' + diff.toExponential(2) + (diff < 0.001 ? ' ✓' : ' ✗'));
        gpuMatmul.destroyBuffers(testBuffers);

        log('\nLoading TensorFlow.js WebGPU backend...');
        await tf.setBackend('webgpu');
        await tf.ready();
        log('tfjs WebGPU ready');

        const sizes = [512, 1024, 2048, 4096];
        const iters = 5;

        log('\n=== BENCHMARK: 16x16 Workgroup ===\n');
        log('Size | Our 16x16   | tfjs WebGPU | Ratio');
        log('-----|-------------|-------------|------');

        for (const n of sizes) {
          const a = new Float32Array(n*n).map(() => Math.random());
          const b = new Float32Array(n*n).map(() => Math.random());
          const buffers = gpuMatmul.createBuffers(n, n, n);
          await gpuMatmul.matmulReuse(a, b, n, n, n, buffers);
          const tA = tf.tensor2d(Array.from(a), [n, n]);
          const tB = tf.tensor2d(Array.from(b), [n, n]);
          await tf.matMul(tA, tB).data();

          let ourTime = Infinity;
          for (let i = 0; i < iters; i++) {
            const start = performance.now();
            await gpuMatmul.matmulReuse(a, b, n, n, n, buffers);
            ourTime = Math.min(ourTime, performance.now() - start);
          }
          gpuMatmul.destroyBuffers(buffers);

          let tfjsTime = Infinity;
          for (let i = 0; i < iters; i++) {
            const start = performance.now();
            const res = tf.matMul(tA, tB);
            await res.data();
            res.dispose();
            tfjsTime = Math.min(tfjsTime, performance.now() - start);
          }
          tA.dispose(); tB.dispose();

          const ratio = (tfjsTime / ourTime).toFixed(2);
          const win = parseFloat(ratio) >= 1.0 ? '✓' : '';
          log(n.toString().padStart(4) + ' | ' + ourTime.toFixed(1).padStart(9) + 'ms | ' + tfjsTime.toFixed(1).padStart(9) + 'ms | ' + ratio.padStart(5) + 'x ' + win);
        }
        log('\n=== ANALYSIS ===');
        log('Ratio > 1.0 = we beat tfjs WebGPU');
        log('\nDONE');
      } catch (e) { log('ERROR: ' + e.message); log(e.stack); }
    };
  </script>
</body>
</html>
