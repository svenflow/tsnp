<!DOCTYPE html>
<html>
<head>
  <title>Stable WebGPU Benchmark - rumpy vs tfjs</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; }
    h2 { color: #00ff88; margin-top: 30px; }
    .status {
      padding: 10px 20px;
      background: #0f3460;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    button {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button:hover { background: #00b8d4; }
    button:disabled { background: #555; cursor: not-allowed; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #333;
    }
    th { background: #0f3460; text-align: left; }
    td:first-child { text-align: left; }
    .winner { background: #1a3a1a; }
    .loser { background: #3a1a1a; }
    .info { background: #0f3460; padding: 15px 20px; border-radius: 8px; margin: 20px 0; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; font-size: 12px; overflow-x: auto; }
    .variance-low { color: #0f8; }
    .variance-high { color: #f80; }
  </style>
</head>
<body>
  <h1>Stable WebGPU Benchmark</h1>
  <p>Using longer warmup, more runs, median timing, and interleaved measurements for stable results.</p>

  <div class="info">
    <strong>Environment:</strong> <span id="env">Checking...</span><br>
    <strong>GPU:</strong> <span id="gpu">Checking...</span><br>
    <strong>WebGPU:</strong> <span id="webgpu-status">Checking...</span>
  </div>

  <div class="status" id="status">Ready</div>

  <button onclick="runStableBenchmark()">Run Stable Benchmark</button>
  <button onclick="runSingleSize(512)">Test 512</button>
  <button onclick="runSingleSize(1024)">Test 1024</button>
  <button onclick="runSingleSize(2048)">Test 2048</button>
  <button onclick="runSingleSize(4096)">Test 4096</button>

  <div id="results"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu/dist/tf-backend-webgpu.min.js"></script>

  <script type="module">
    // ============ Benchmark Config ============
    const WARMUP_RUNS = 10;      // More warmup to reach steady state
    const BENCHMARK_RUNS = 30;   // More runs for better statistics
    const COOLDOWN_MS = 200;     // Cooldown between major phases
    const INTERLEAVE_RUNS = 5;   // Interleave rumpy/tfjs this many times

    let gpuDevice = null;
    const shaderCache = new Map();

    document.getElementById('env').textContent =
      `Chrome ${navigator.userAgent.match(/Chrome\/(\d+)/)?.[1] || 'unknown'}` +
      (navigator.userAgent.includes('HeadlessChrome') ? ' (Headless/Playwright)' : ' (Native)');

    // ============ FIT-16x16 Shader ============
    const MATMUL_FIT_16_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, _pad: u32, }
      const TILE_M: u32 = 16u;
      const TILE_N: u32 = 16u;
      const TILE_K: u32 = 16u;
      const TILE_PADDED: u32 = 17u;

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<f32>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;

      var<workgroup> As: array<f32, 272>;
      var<workgroup> Bs: array<f32, 272>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let M = uniforms.M;
        let K = uniforms.K;
        let N = uniforms.N;
        let tx = lid.x;
        let ty = lid.y;

        let globalRow = wid.y * TILE_M + ty;
        let globalCol = wid.x * TILE_N + tx;

        var acc: f32 = 0.0;
        let numTiles = K / TILE_K;

        for (var t: u32 = 0u; t < numTiles; t = t + 1u) {
          let globalARow = wid.y * TILE_M + ty;
          let globalACol = t * TILE_K + tx;
          let globalBRow = t * TILE_K + ty;
          let globalBCol = wid.x * TILE_N + tx;

          As[ty * TILE_PADDED + tx] = A[globalARow * K + globalACol];
          Bs[ty * TILE_PADDED + tx] = B[globalBRow * N + globalBCol];

          workgroupBarrier();

          for (var k: u32 = 0u; k < TILE_K; k = k + 1u) {
            acc = fma(As[ty * TILE_PADDED + k], Bs[k * TILE_PADDED + tx], acc);
          }

          workgroupBarrier();
        }

        C[globalRow * N + globalCol] = acc;
      }
    `;

    // ============ WebGPU Init ============
    async function initWebGPU() {
      if (!navigator.gpu) throw new Error('WebGPU not supported');
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) throw new Error('No WebGPU adapter');
      gpuDevice = await adapter.requestDevice({
        requiredLimits: { maxStorageBufferBindingSize: 1024 * 1024 * 1024, maxBufferSize: 1024 * 1024 * 1024 }
      });
      document.getElementById('gpu').textContent = adapter.name || 'Unknown';
      document.getElementById('webgpu-status').textContent = 'READY';
      return gpuDevice;
    }

    // ============ rumpy matmul ============
    async function rumpyMatmul(M, K, N, aData, bData) {
      const uniformBuffer = gpuDevice.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, 0]));

      const aBuffer = gpuDevice.createBuffer({ size: aData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(aBuffer, 0, aData);

      const bBuffer = gpuDevice.createBuffer({ size: bData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(bBuffer, 0, bData);

      const cBuffer = gpuDevice.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

      let pipeline = shaderCache.get('FIT-16x16');
      if (!pipeline) {
        const module = gpuDevice.createShaderModule({ code: MATMUL_FIT_16_SHADER });
        pipeline = gpuDevice.createComputePipeline({ layout: 'auto', compute: { module, entryPoint: 'main' } });
        shaderCache.set('FIT-16x16', pipeline);
      }

      const bindGroup = gpuDevice.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: bBuffer } },
          { binding: 3, resource: { buffer: cBuffer } },
        ],
      });

      const commandEncoder = gpuDevice.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(Math.ceil(N / 16), Math.ceil(M / 16));
      pass.end();

      const stagingBuffer = gpuDevice.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
      commandEncoder.copyBufferToBuffer(cBuffer, 0, stagingBuffer, 0, M * N * 4);
      gpuDevice.queue.submit([commandEncoder.finish()]);
      await stagingBuffer.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(stagingBuffer.getMappedRange().slice(0));
      stagingBuffer.unmap();

      uniformBuffer.destroy(); aBuffer.destroy(); bBuffer.destroy(); cBuffer.destroy(); stagingBuffer.destroy();
      return result;
    }

    // ============ Stats Helpers ============
    function median(arr) {
      const sorted = [...arr].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function stdDev(arr) {
      const avg = arr.reduce((a, b) => a + b) / arr.length;
      const sqDiffs = arr.map(x => (x - avg) ** 2);
      return Math.sqrt(sqDiffs.reduce((a, b) => a + b) / arr.length);
    }

    function coefficientOfVariation(arr) {
      const avg = arr.reduce((a, b) => a + b) / arr.length;
      return (stdDev(arr) / avg) * 100;  // as percentage
    }

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ============ Interleaved Benchmark ============
    async function benchmarkInterleaved(size) {
      const M = size, K = size, N = size;
      const flops = 2 * M * N * K;

      // Create test data (same for both)
      const aData = new Float32Array(M * K);
      const bData = new Float32Array(K * N);
      for (let i = 0; i < M * K; i++) aData[i] = Math.random();
      for (let i = 0; i < K * N; i++) bData[i] = Math.random();

      // Warmup rumpy
      setStatus(`${size}x${size}: Warming up rumpy...`);
      for (let i = 0; i < WARMUP_RUNS; i++) {
        await rumpyMatmul(M, K, N, aData, bData);
      }
      await sleep(COOLDOWN_MS);

      // Warmup tfjs
      setStatus(`${size}x${size}: Warming up tfjs...`);
      try {
        await tf.setBackend('webgpu');
        await tf.ready();
      } catch (e) {
        return { rumpyTimes: [], tfjsTimes: [], error: 'tfjs init failed' };
      }
      const a = tf.tensor2d(aData, [M, K]);
      const b = tf.tensor2d(bData, [K, N]);
      for (let i = 0; i < WARMUP_RUNS; i++) {
        const c = tf.matMul(a, b);
        await c.data();
        c.dispose();
      }
      await sleep(COOLDOWN_MS);

      // Interleaved benchmark
      const rumpyTimes = [];
      const tfjsTimes = [];
      const runsPerPhase = Math.ceil(BENCHMARK_RUNS / INTERLEAVE_RUNS);

      for (let phase = 0; phase < INTERLEAVE_RUNS; phase++) {
        setStatus(`${size}x${size}: Phase ${phase + 1}/${INTERLEAVE_RUNS}...`);

        // rumpy runs
        for (let i = 0; i < runsPerPhase && rumpyTimes.length < BENCHMARK_RUNS; i++) {
          const start = performance.now();
          await rumpyMatmul(M, K, N, aData, bData);
          rumpyTimes.push(performance.now() - start);
        }

        await sleep(50);

        // tfjs runs
        for (let i = 0; i < runsPerPhase && tfjsTimes.length < BENCHMARK_RUNS; i++) {
          const start = performance.now();
          const c = tf.matMul(a, b);
          await c.data();
          c.dispose();
          tfjsTimes.push(performance.now() - start);
        }

        await sleep(50);
      }

      a.dispose();
      b.dispose();

      return { rumpyTimes, tfjsTimes, flops };
    }

    async function runSingleSize(size) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<h2>Testing ${size}x${size}...</h2>`;

      await initWebGPU();
      const result = await benchmarkInterleaved(size);

      if (result.error) {
        resultsDiv.innerHTML = `<h2>${size}x${size} Error</h2><p>${result.error}</p>`;
        return;
      }

      const rumpyMedian = median(result.rumpyTimes);
      const tfjsMedian = median(result.tfjsTimes);
      const rumpyCV = coefficientOfVariation(result.rumpyTimes);
      const tfjsCV = coefficientOfVariation(result.tfjsTimes);
      const rumpyGflops = (result.flops / (rumpyMedian / 1000)) / 1e9;
      const tfjsGflops = (result.flops / (tfjsMedian / 1000)) / 1e9;

      const winner = rumpyMedian < tfjsMedian ? 'rumpy' : 'tfjs';
      const ratio = winner === 'rumpy'
        ? (tfjsMedian / rumpyMedian).toFixed(2)
        : (rumpyMedian / tfjsMedian).toFixed(2);

      resultsDiv.innerHTML = `
        <h2>${size}x${size} Results</h2>
        <table>
          <tr><th>Backend</th><th>Median ms</th><th>GFLOPS</th><th>CV%</th></tr>
          <tr class="${winner === 'rumpy' ? 'winner' : 'loser'}">
            <td>rumpy (FIT-16x16)</td>
            <td>${rumpyMedian.toFixed(2)}</td>
            <td>${rumpyGflops.toFixed(0)}</td>
            <td class="${rumpyCV < 10 ? 'variance-low' : 'variance-high'}">${rumpyCV.toFixed(1)}%</td>
          </tr>
          <tr class="${winner === 'tfjs' ? 'winner' : 'loser'}">
            <td>tfjs WebGPU</td>
            <td>${tfjsMedian.toFixed(2)}</td>
            <td>${tfjsGflops.toFixed(0)}</td>
            <td class="${tfjsCV < 10 ? 'variance-low' : 'variance-high'}">${tfjsCV.toFixed(1)}%</td>
          </tr>
        </table>
        <p><strong>${winner} wins by ${ratio}x</strong></p>
        <h3>Raw Times (ms)</h3>
        <pre>
rumpy: [${result.rumpyTimes.map(t => t.toFixed(1)).join(', ')}]
tfjs:  [${result.tfjsTimes.map(t => t.toFixed(1)).join(', ')}]
        </pre>
      `;
      setStatus('Complete!');
    }

    async function runStableBenchmark() {
      const sizes = [512, 1024, 2048, 4096];
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<h2>Running Stable Benchmark...</h2>';

      await initWebGPU();

      let html = '<table><tr><th>Size</th><th>rumpy GFLOPS</th><th>rumpy CV%</th><th>tfjs GFLOPS</th><th>tfjs CV%</th><th>Winner</th></tr>';

      for (const size of sizes) {
        const result = await benchmarkInterleaved(size);

        if (result.error) {
          html += `<tr><td>${size}x${size}</td><td colspan="5">Error: ${result.error}</td></tr>`;
          continue;
        }

        const rumpyMedian = median(result.rumpyTimes);
        const tfjsMedian = median(result.tfjsTimes);
        const rumpyCV = coefficientOfVariation(result.rumpyTimes);
        const tfjsCV = coefficientOfVariation(result.tfjsTimes);
        const rumpyGflops = (result.flops / (rumpyMedian / 1000)) / 1e9;
        const tfjsGflops = (result.flops / (tfjsMedian / 1000)) / 1e9;

        const winner = rumpyMedian < tfjsMedian ? 'rumpy' : 'tfjs';
        const ratio = winner === 'rumpy'
          ? (tfjsMedian / rumpyMedian).toFixed(2)
          : (rumpyMedian / tfjsMedian).toFixed(2);

        html += `<tr class="${winner === 'rumpy' ? 'winner' : 'loser'}">`;
        html += `<td>${size}x${size}</td>`;
        html += `<td>${rumpyGflops.toFixed(0)}</td>`;
        html += `<td class="${rumpyCV < 10 ? 'variance-low' : 'variance-high'}">${rumpyCV.toFixed(1)}%</td>`;
        html += `<td>${tfjsGflops.toFixed(0)}</td>`;
        html += `<td class="${tfjsCV < 10 ? 'variance-low' : 'variance-high'}">${tfjsCV.toFixed(1)}%</td>`;
        html += `<td><strong>${winner}</strong> ${ratio}x</td>`;
        html += '</tr>';

        await sleep(COOLDOWN_MS * 2);  // Extra cooldown between sizes
      }

      html += '</table>';
      html += '<p>CV% = Coefficient of Variation (lower = more stable). Green = CV < 10%, Orange = CV >= 10%</p>';
      resultsDiv.innerHTML = '<h2>Stable Benchmark Results</h2>' + html;
      setStatus('Complete!');
    }

    window.runStableBenchmark = runStableBenchmark;
    window.runSingleSize = runSingleSize;

    initWebGPU().catch(e => {
      document.getElementById('webgpu-status').textContent = 'FAILED: ' + e.message;
    });
  </script>
</body>
</html>
