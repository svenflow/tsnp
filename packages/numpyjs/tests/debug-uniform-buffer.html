<!DOCTYPE html>
<html>
<head>
  <title>Debug: Uniform Buffer</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; white-space: pre-wrap; }
    button { background: #00d9ff; color: #1a1a2e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Debug: Uniform Buffer</h1>
  <button onclick="runTest()">Run Test</button>
  <pre id="output">Click to run...</pre>

  <script type="module">
    const log = (msg) => { document.getElementById('output').textContent += msg + '\n'; };

    // No uniform, just storage
    const SHADER_STORAGE_ONLY = `
      @group(0) @binding(0) var<storage, read> input: array<f32>;
      @group(0) @binding(1) var<storage, read_write> output: array<f32>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
        let idx = gid.y * 16u + gid.x;
        output[idx] = input[idx] + 1.0;
      }
    `;

    // With uniform buffer
    const SHADER_WITH_UNIFORM = `
      struct Uniforms { M: u32, K: u32, N: u32, _pad: u32, }

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> input: array<f32>;
      @group(0) @binding(2) var<storage, read_write> output: array<f32>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
        let idx = gid.y * 16u + gid.x;
        output[idx] = input[idx] + f32(uniforms.M);
      }
    `;

    // Simpler - just output a constant
    const SHADER_CONSTANT = `
      @group(0) @binding(0) var<storage, read_write> output: array<f32>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
        let idx = gid.y * 16u + gid.x;
        output[idx] = 999.0;
      }
    `;

    async function runStorageOnlyTest(device) {
      const input = new Float32Array(256);
      for (let i = 0; i < 256; i++) input[i] = i;

      const inputBuffer = device.createBuffer({
        size: input.byteLength,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(inputBuffer, 0, input);

      const outputBuffer = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      const module = device.createShaderModule({ code: SHADER_STORAGE_ONLY });
      const pipeline = device.createComputePipeline({
        layout: 'auto',
        compute: { module, entryPoint: 'main' },
      });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: inputBuffer } },
          { binding: 1, resource: { buffer: outputBuffer } },
        ],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(1, 1);
      pass.end();

      const staging = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(outputBuffer, 0, staging, 0, 256 * 4);
      device.queue.submit([commandEncoder.finish()]);
      await staging.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(staging.getMappedRange().slice(0));
      staging.unmap();

      inputBuffer.destroy();
      outputBuffer.destroy();
      staging.destroy();

      const first5 = Array.from(result.slice(0, 5));
      log(`Storage only (expect 1,2,3,4,5): [${first5.map(v => v.toFixed(0)).join(', ')}] - ${first5[0] === 1 ? 'PASS' : 'FAIL'}`);
    }

    async function runConstantTest(device) {
      const outputBuffer = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      const module = device.createShaderModule({ code: SHADER_CONSTANT });
      const pipeline = device.createComputePipeline({
        layout: 'auto',
        compute: { module, entryPoint: 'main' },
      });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: outputBuffer } },
        ],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(1, 1);
      pass.end();

      const staging = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(outputBuffer, 0, staging, 0, 256 * 4);
      device.queue.submit([commandEncoder.finish()]);
      await staging.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(staging.getMappedRange().slice(0));
      staging.unmap();

      outputBuffer.destroy();
      staging.destroy();

      const first5 = Array.from(result.slice(0, 5));
      log(`Constant output (expect 999): [${first5.map(v => v.toFixed(0)).join(', ')}] - ${first5[0] === 999 ? 'PASS' : 'FAIL'}`);
    }

    async function runUniformTest(device) {
      const uniformBuffer = device.createBuffer({
        size: 16,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([64, 64, 64, 0]));

      const input = new Float32Array(256);
      for (let i = 0; i < 256; i++) input[i] = i;

      const inputBuffer = device.createBuffer({
        size: input.byteLength,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(inputBuffer, 0, input);

      const outputBuffer = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      const module = device.createShaderModule({ code: SHADER_WITH_UNIFORM });
      const pipeline = device.createComputePipeline({
        layout: 'auto',
        compute: { module, entryPoint: 'main' },
      });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: inputBuffer } },
          { binding: 2, resource: { buffer: outputBuffer } },
        ],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(1, 1);
      pass.end();

      const staging = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(outputBuffer, 0, staging, 0, 256 * 4);
      device.queue.submit([commandEncoder.finish()]);
      await staging.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(staging.getMappedRange().slice(0));
      staging.unmap();

      uniformBuffer.destroy();
      inputBuffer.destroy();
      outputBuffer.destroy();
      staging.destroy();

      const first5 = Array.from(result.slice(0, 5));
      // Expected: input[i] + M = 0+64, 1+64, 2+64 = 64, 65, 66...
      log(`With uniform (expect 64,65,66...): [${first5.map(v => v.toFixed(0)).join(', ')}] - ${first5[0] === 64 ? 'PASS' : 'FAIL'}`);
    }

    window.runTest = async function() {
      document.getElementById('output').textContent = '';
      log('Initializing WebGPU...');

      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();
      log('WebGPU initialized\n');

      await runConstantTest(device);
      await runStorageOnlyTest(device);
      await runUniformTest(device);

      log('\n=== Done ===');
    };
  </script>
</body>
</html>
