<!DOCTYPE html>
<html>
<head>
  <title>Autotune with Correctness</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; white-space: pre-wrap; }
    button { background: #00d9ff; color: #1a1a2e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 5px; }
    table { border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 10px; border: 1px solid #333; text-align: right; }
    th { background: #0f3460; }
    .winner { background: #1a4a1a; }
    .loser { background: #4a1a1a; }
  </style>
</head>
<body>
  <h1>Autotune Benchmark with Correctness Verification</h1>
  <button onclick="runAutotune()">Run Autotune Benchmark</button>
  <button onclick="verifyCorrectness()">Verify All Shaders</button>
  <pre id="output">Click a button to run...</pre>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu/dist/tf-backend-webgpu.min.js"></script>

  <script type="module">
    let device = null;
    const log = (msg) => { document.getElementById('output').textContent += msg + '\n'; };

    // FIT-64x64 with BLOCK_K=16 (fixed to fit in 16KB)
    const FIT_64_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, NPadded: u32, }
      const BLOCK_M: u32 = 64u; const BLOCK_N: u32 = 64u; const BLOCK_K: u32 = 16u;
      const THREAD_M: u32 = 4u; const BLOCK_M_PADDED: u32 = 65u;
      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<vec4<f32>>;
      @group(0) @binding(3) var<storage, read_write> C: array<vec4<f32>>;
      var<workgroup> As: array<f32, 1040>;
      var<workgroup> Bs: array<vec4<f32>, 272>;
      const BLOCK_N_VEC4_PADDED: u32 = 17u;
      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let K = uniforms.K; let NVec4 = uniforms.NPadded / 4u; let NVec4Out = uniforms.N / 4u;
        let tx = lid.x; let ty = lid.y; let tid = ty * 16u + tx;
        let outRowBase = wid.y * BLOCK_M + ty * THREAD_M;
        let outColVec4 = wid.x * (BLOCK_N / 4u) + tx;
        var acc0: vec4<f32> = vec4<f32>(0.0); var acc1: vec4<f32> = vec4<f32>(0.0);
        var acc2: vec4<f32> = vec4<f32>(0.0); var acc3: vec4<f32> = vec4<f32>(0.0);
        let numTiles = K / BLOCK_K;
        for (var t: u32 = 0u; t < numTiles; t = t + 1u) {
          for (var i: u32 = 0u; i < 5u; i = i + 1u) {
            let loadIdx = tid * 5u + i;
            if (loadIdx < 1040u) {
              let loadK = loadIdx / BLOCK_M; let loadRow = loadIdx % BLOCK_M;
              let globalK = t * BLOCK_K + loadK; let globalRow = wid.y * BLOCK_M + loadRow;
              As[loadK * BLOCK_M_PADDED + loadRow] = A[globalRow * K + globalK];
            }
          }
          if (tid < 272u) {
            let loadK = tid / 16u; let loadColVec = tid % 16u;
            let globalK = t * BLOCK_K + loadK; let globalColVec = wid.x * 16u + loadColVec;
            Bs[loadK * BLOCK_N_VEC4_PADDED + loadColVec] = B[globalK * NVec4 + globalColVec];
          }
          workgroupBarrier();
          let aRowBase = ty * THREAD_M;
          for (var k: u32 = 0u; k < BLOCK_K; k = k + 1u) {
            let a0 = As[k * BLOCK_M_PADDED + aRowBase]; let a1 = As[k * BLOCK_M_PADDED + aRowBase + 1u];
            let a2 = As[k * BLOCK_M_PADDED + aRowBase + 2u]; let a3 = As[k * BLOCK_M_PADDED + aRowBase + 3u];
            let b = Bs[k * BLOCK_N_VEC4_PADDED + tx];
            acc0 = fma(vec4<f32>(a0), b, acc0); acc1 = fma(vec4<f32>(a1), b, acc1);
            acc2 = fma(vec4<f32>(a2), b, acc2); acc3 = fma(vec4<f32>(a3), b, acc3);
          }
          workgroupBarrier();
        }
        C[(outRowBase + 0u) * NVec4Out + outColVec4] = acc0;
        C[(outRowBase + 1u) * NVec4Out + outColVec4] = acc1;
        C[(outRowBase + 2u) * NVec4Out + outColVec4] = acc2;
        C[(outRowBase + 3u) * NVec4Out + outColVec4] = acc3;
      }
    `;

    // FIT-32x32 shader (from autotune-benchmark.html)
    const FIT_32_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, NPadded: u32, }
      const TILE_M: u32 = 32u; const TILE_N: u32 = 32u; const TILE_K: u32 = 32u;
      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<vec4<f32>>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;
      var<workgroup> mm_Asub: array<array<vec4<f32>, 8>, 32>;
      var<workgroup> mm_Bsub: array<array<vec4<f32>, 8>, 32>;
      @compute @workgroup_size(8, 8)
      fn main(@builtin(global_invocation_id) gid: vec3<u32>, @builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let K = uniforms.K; let N = uniforms.N; let NVec4 = uniforms.NPadded / 4u;
        let localRow = lid.y; let localCol = lid.x; let tileRow = localRow * 4u;
        let globalRow = gid.y * 4u; let globalCol = gid.x * 4u;
        let numTiles = K / TILE_K;
        var acc0: vec4<f32> = vec4<f32>(0.0); var acc1: vec4<f32> = vec4<f32>(0.0);
        var acc2: vec4<f32> = vec4<f32>(0.0); var acc3: vec4<f32> = vec4<f32>(0.0);
        var kStart: u32 = 0u;
        for (var t: u32 = 0u; t < numTiles; t++) {
          for (var i: u32 = 0u; i < 4u; i++) {
            let row = tileRow + i; let col = localCol;
            let gRow = wid.y * TILE_M + row; let gKBase = kStart + col * 4u;
            let base = gRow * K + gKBase;
            mm_Asub[row][col] = vec4<f32>(A[base], A[base+1u], A[base+2u], A[base+3u]);
          }
          for (var i: u32 = 0u; i < 4u; i++) {
            let kRow = localRow * 4u + i; let colVec = localCol;
            let gK = kStart + kRow; let gColVec = wid.x * 8u + colVec;
            mm_Bsub[kRow][colVec] = B[gK * NVec4 + gColVec];
          }
          kStart = kStart + TILE_K; workgroupBarrier();
          for (var k: u32 = 0u; k < 8u; k++) {
            let BCached0 = mm_Bsub[k * 4u + 0u][localCol]; let BCached1 = mm_Bsub[k * 4u + 1u][localCol];
            let BCached2 = mm_Bsub[k * 4u + 2u][localCol]; let BCached3 = mm_Bsub[k * 4u + 3u][localCol];
            let ACached0 = mm_Asub[tileRow + 0u][k]; let ACached1 = mm_Asub[tileRow + 1u][k];
            let ACached2 = mm_Asub[tileRow + 2u][k]; let ACached3 = mm_Asub[tileRow + 3u][k];
            acc0 = fma(vec4<f32>(ACached0.x), BCached0, acc0); acc0 = fma(vec4<f32>(ACached0.y), BCached1, acc0);
            acc0 = fma(vec4<f32>(ACached0.z), BCached2, acc0); acc0 = fma(vec4<f32>(ACached0.w), BCached3, acc0);
            acc1 = fma(vec4<f32>(ACached1.x), BCached0, acc1); acc1 = fma(vec4<f32>(ACached1.y), BCached1, acc1);
            acc1 = fma(vec4<f32>(ACached1.z), BCached2, acc1); acc1 = fma(vec4<f32>(ACached1.w), BCached3, acc1);
            acc2 = fma(vec4<f32>(ACached2.x), BCached0, acc2); acc2 = fma(vec4<f32>(ACached2.y), BCached1, acc2);
            acc2 = fma(vec4<f32>(ACached2.z), BCached2, acc2); acc2 = fma(vec4<f32>(ACached2.w), BCached3, acc2);
            acc3 = fma(vec4<f32>(ACached3.x), BCached0, acc3); acc3 = fma(vec4<f32>(ACached3.y), BCached1, acc3);
            acc3 = fma(vec4<f32>(ACached3.z), BCached2, acc3); acc3 = fma(vec4<f32>(ACached3.w), BCached3, acc3);
          }
          workgroupBarrier();
        }
        let outBase0 = (globalRow + 0u) * N + globalCol; let outBase1 = (globalRow + 1u) * N + globalCol;
        let outBase2 = (globalRow + 2u) * N + globalCol; let outBase3 = (globalRow + 3u) * N + globalCol;
        C[outBase0 + 0u] = acc0.x; C[outBase0 + 1u] = acc0.y; C[outBase0 + 2u] = acc0.z; C[outBase0 + 3u] = acc0.w;
        C[outBase1 + 0u] = acc1.x; C[outBase1 + 1u] = acc1.y; C[outBase1 + 2u] = acc1.z; C[outBase1 + 3u] = acc1.w;
        C[outBase2 + 0u] = acc2.x; C[outBase2 + 1u] = acc2.y; C[outBase2 + 2u] = acc2.z; C[outBase2 + 3u] = acc2.w;
        C[outBase3 + 0u] = acc3.x; C[outBase3 + 1u] = acc3.y; C[outBase3 + 2u] = acc3.z; C[outBase3 + 3u] = acc3.w;
      }
    `;

    // Simple naive shader for baseline
    const NAIVE_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, _pad: u32, }
      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<f32>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;
      @compute @workgroup_size(16, 16)
      fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
        let row = gid.y; let col = gid.x;
        if (row >= uniforms.M || col >= uniforms.N) { return; }
        var sum: f32 = 0.0;
        for (var k: u32 = 0u; k < uniforms.K; k = k + 1u) {
          sum = sum + A[row * uniforms.K + k] * B[k * uniforms.N + col];
        }
        C[row * uniforms.N + col] = sum;
      }
    `;

    const SHADERS = {
      'FIT-64': { code: FIT_64_SHADER, tileM: 64, tileN: 64, wgSize: [16, 16], usesVec4Output: true },
      'FIT-32': { code: FIT_32_SHADER, tileM: 32, tileN: 32, wgSize: [8, 8], usesVec4Output: false },
      'Naive': { code: NAIVE_SHADER, tileM: 16, tileN: 16, wgSize: [16, 16], usesVec4Output: false, isNaive: true },
    };

    const pipelineCache = new Map();

    async function init() {
      const adapter = await navigator.gpu.requestAdapter();
      device = await adapter.requestDevice({
        requiredLimits: {
          maxStorageBufferBindingSize: 1024 * 1024 * 1024,
          maxBufferSize: 1024 * 1024 * 1024,
        }
      });
      log('WebGPU initialized: ' + (adapter.name || 'unknown'));
      log(`Max workgroup storage: ${device.limits.maxComputeWorkgroupStorageSize} bytes`);
    }

    function cpuMatmul(M, K, N, aData, bData) {
      const result = new Float32Array(M * N);
      for (let m = 0; m < M; m++) {
        for (let n = 0; n < N; n++) {
          let sum = 0;
          for (let k = 0; k < K; k++) {
            sum += aData[m * K + k] * bData[k * N + n];
          }
          result[m * N + n] = sum;
        }
      }
      return result;
    }

    async function runMatmul(shaderName, M, K, N, aData, bData) {
      const config = SHADERS[shaderName];
      const NPadded = Math.ceil(N / 4) * 4;

      // Create uniform buffer
      const uniformBuffer = device.createBuffer({
        size: 16,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, NPadded]));

      // Create A buffer
      const aBuffer = device.createBuffer({
        size: aData.byteLength,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(aBuffer, 0, aData);

      // Create B buffer (padded for vec4 for tiled shaders)
      let bBuffer;
      if (config.isNaive) {
        bBuffer = device.createBuffer({
          size: bData.byteLength,
          usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(bBuffer, 0, bData);
      } else {
        const bPadded = new Float32Array(K * NPadded);
        for (let k = 0; k < K; k++) {
          for (let n = 0; n < N; n++) {
            bPadded[k * NPadded + n] = bData[k * N + n];
          }
        }
        bBuffer = device.createBuffer({
          size: bPadded.byteLength,
          usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });
        device.queue.writeBuffer(bBuffer, 0, bPadded);
      }

      // Create C buffer
      const cSize = config.usesVec4Output ? M * NPadded * 4 : M * N * 4;
      const cBuffer = device.createBuffer({
        size: cSize,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      // Get or create pipeline
      let pipeline = pipelineCache.get(shaderName);
      if (!pipeline) {
        const module = device.createShaderModule({ code: config.code });
        pipeline = device.createComputePipeline({
          layout: 'auto',
          compute: { module, entryPoint: 'main' },
        });
        pipelineCache.set(shaderName, pipeline);
      }

      // Create bind group
      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: bBuffer } },
          { binding: 3, resource: { buffer: cBuffer } },
        ],
      });

      // Dispatch
      const wgX = config.isNaive ? Math.ceil(N / config.wgSize[0]) : Math.ceil(N / config.tileN);
      const wgY = config.isNaive ? Math.ceil(M / config.wgSize[1]) : Math.ceil(M / config.tileM);

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(wgX, wgY);
      pass.end();

      // Read back
      const stagingBuffer = device.createBuffer({
        size: cSize,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(cBuffer, 0, stagingBuffer, 0, cSize);
      device.queue.submit([commandEncoder.finish()]);
      await device.queue.onSubmittedWorkDone();
      await stagingBuffer.mapAsync(GPUMapMode.READ);
      const resultPadded = new Float32Array(stagingBuffer.getMappedRange().slice(0));
      stagingBuffer.unmap();

      // Cleanup
      uniformBuffer.destroy();
      aBuffer.destroy();
      bBuffer.destroy();
      cBuffer.destroy();
      stagingBuffer.destroy();

      // Unpad result if needed
      if (config.usesVec4Output) {
        const result = new Float32Array(M * N);
        for (let m = 0; m < M; m++) {
          for (let n = 0; n < N; n++) {
            result[m * N + n] = resultPadded[m * NPadded + n];
          }
        }
        return result;
      }
      return resultPadded;
    }

    async function benchmarkShader(shaderName, size, warmupRuns = 3, benchRuns = 10) {
      const M = size, K = size, N = size;
      const flops = 2 * M * N * K;

      const aData = new Float32Array(M * K);
      const bData = new Float32Array(K * N);
      for (let i = 0; i < M * K; i++) aData[i] = Math.random() - 0.5;
      for (let i = 0; i < K * N; i++) bData[i] = Math.random() - 0.5;

      // Warmup
      for (let i = 0; i < warmupRuns; i++) {
        await runMatmul(shaderName, M, K, N, aData, bData);
      }

      // Benchmark
      const times = [];
      for (let i = 0; i < benchRuns; i++) {
        const start = performance.now();
        await runMatmul(shaderName, M, K, N, aData, bData);
        times.push(performance.now() - start);
      }

      const avgMs = times.reduce((a, b) => a + b) / times.length;
      const gflops = (flops / (avgMs / 1000)) / 1e9;
      return { avgMs, gflops };
    }

    async function benchmarkTfjs(size, warmupRuns = 3, benchRuns = 10) {
      try {
        await tf.setBackend('webgpu');
        await tf.ready();
      } catch (e) {
        return null;
      }

      const flops = 2 * size * size * size;
      const a = tf.randomUniform([size, size], -0.5, 0.5, 'float32');
      const b = tf.randomUniform([size, size], -0.5, 0.5, 'float32');

      // Warmup
      for (let i = 0; i < warmupRuns; i++) {
        const c = tf.matMul(a, b);
        await c.data();
        c.dispose();
      }

      // Benchmark
      const times = [];
      for (let i = 0; i < benchRuns; i++) {
        const start = performance.now();
        const c = tf.matMul(a, b);
        await c.data();
        times.push(performance.now() - start);
        c.dispose();
      }

      a.dispose();
      b.dispose();

      const avgMs = times.reduce((a, b) => a + b) / times.length;
      const gflops = (flops / (avgMs / 1000)) / 1e9;
      return { avgMs, gflops };
    }

    window.verifyCorrectness = async function() {
      document.getElementById('output').textContent = '';
      await init();
      log('\n=== Verifying Correctness of All Shaders ===\n');

      const sizes = [64, 128, 256];

      for (const shaderName of ['FIT-64', 'FIT-32', 'Naive']) {
        log(`Testing ${shaderName}...`);
        let allPass = true;

        for (const size of sizes) {
          // Skip FIT-32 for sizes not divisible by 32
          if (shaderName === 'FIT-32' && size % 32 !== 0) continue;

          const M = size, K = size, N = size;
          const aData = new Float32Array(M * K);
          const bData = new Float32Array(K * N);
          for (let i = 0; i < M * K; i++) aData[i] = (i % 17) * 0.1 - 0.8;
          for (let i = 0; i < K * N; i++) bData[i] = (i % 13) * 0.1 - 0.6;

          const cpuResult = cpuMatmul(M, K, N, aData, bData);
          const gpuResult = await runMatmul(shaderName, M, K, N, aData, bData);

          let maxRelError = 0;
          let allZeros = true;
          for (let i = 0; i < M * N; i++) {
            if (gpuResult[i] !== 0) allZeros = false;
            const absErr = Math.abs(cpuResult[i] - gpuResult[i]);
            const relErr = Math.abs(cpuResult[i]) > 1e-6 ? absErr / Math.abs(cpuResult[i]) : absErr;
            maxRelError = Math.max(maxRelError, relErr);
          }

          const pass = !allZeros && maxRelError < 0.01;
          if (!pass) allPass = false;
          log(`  ${size}x${size}: ${pass ? 'PASS' : 'FAIL'} (max error: ${(maxRelError * 100).toFixed(4)}%, zeros: ${allZeros})`);
        }

        log(`  Overall: ${allPass ? '✓ PASS' : '✗ FAIL'}\n`);
      }
    };

    window.runAutotune = async function() {
      document.getElementById('output').textContent = '';
      await init();
      log('\n=== Autotuning Benchmark ===\n');

      const sizes = [512, 1024, 2048, 4096];
      const results = [];

      for (const size of sizes) {
        log(`\nBenchmarking ${size}x${size}...`);

        const shaderResults = {};

        // Test each shader
        for (const shaderName of ['FIT-64', 'FIT-32']) {
          try {
            const result = await benchmarkShader(shaderName, size);
            shaderResults[shaderName] = result;
            log(`  ${shaderName}: ${result.gflops.toFixed(0)} GFLOPS (${result.avgMs.toFixed(2)}ms)`);
          } catch (e) {
            log(`  ${shaderName}: FAILED (${e.message})`);
          }
        }

        // Test tfjs
        const tfjsResult = await benchmarkTfjs(size);
        if (tfjsResult) {
          shaderResults['tfjs'] = tfjsResult;
          log(`  tfjs: ${tfjsResult.gflops.toFixed(0)} GFLOPS (${tfjsResult.avgMs.toFixed(2)}ms)`);
        }

        // Find winner
        let bestShader = null;
        let bestGflops = 0;
        for (const [name, result] of Object.entries(shaderResults)) {
          if (result && result.gflops > bestGflops) {
            bestGflops = result.gflops;
            bestShader = name;
          }
        }

        results.push({ size, ...shaderResults, winner: bestShader });
        log(`  WINNER: ${bestShader} (${bestGflops.toFixed(0)} GFLOPS)`);
      }

      // Summary table
      log('\n=== Summary ===\n');
      log('Size\t\tFIT-64\t\tFIT-32\t\ttfjs\t\tWinner');
      log('----\t\t------\t\t------\t\t----\t\t------');
      for (const r of results) {
        const fit64 = r['FIT-64'] ? `${r['FIT-64'].gflops.toFixed(0)}` : 'N/A';
        const fit32 = r['FIT-32'] ? `${r['FIT-32'].gflops.toFixed(0)}` : 'N/A';
        const tfjs = r['tfjs'] ? `${r['tfjs'].gflops.toFixed(0)}` : 'N/A';
        log(`${r.size}\t\t${fit64}\t\t${fit32}\t\t${tfjs}\t\t${r.winner}`);
      }

      // Report if we beat tfjs
      log('\n=== vs tfjs ===');
      for (const r of results) {
        if (r['tfjs']) {
          const tfjsGflops = r['tfjs'].gflops;
          const bestRumpy = Math.max(r['FIT-64']?.gflops || 0, r['FIT-32']?.gflops || 0);
          const ratio = bestRumpy / tfjsGflops;
          const status = ratio >= 1 ? '✓ WIN' : '✗ LOSE';
          log(`${r.size}: rumpy ${ratio.toFixed(2)}x tfjs ${status}`);
        }
      }
    };
  </script>
</body>
</html>
