<!DOCTYPE html>
<html>
<head>
  <title>Buffer Pool Test - With vs Without Pooling</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { color: #00d9ff; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; }
    button { background: #00d9ff; color: #1a1a2e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>
  <h1>Buffer Pool Comparison Test</h1>
  <p>Comparing matmul with pooled buffers vs new buffers each call</p>
  <button onclick="runTest()">Run Test</button>
  <pre id="results">Click Run Test to begin</pre>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu/dist/tf-backend-webgpu.min.js"></script>

  <script>
    const SIZE = 1024;
    const RUNS = 20;
    let device;

    const SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, _pad: u32, }
      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<vec4<f32>>;
      @group(0) @binding(2) var<storage, read> B: array<vec4<f32>>;
      @group(0) @binding(3) var<storage, read_write> C: array<vec4<f32>>;
      var<workgroup> mm_Asub: array<array<vec4<f32>, 8>, 32>;
      var<workgroup> mm_Bsub: array<array<vec4<f32>, 8>, 32>;

      @compute @workgroup_size(8, 8, 1)
      fn main(@builtin(local_invocation_id) localId: vec3<u32>, @builtin(global_invocation_id) globalId: vec3<u32>) {
        let M = i32(uniforms.M);
        let K = i32(uniforms.K);
        let N = i32(uniforms.N);
        let KVec4 = K / 4;
        let NVec4 = N / 4;
        let localRow = i32(localId.y);
        let tileRow = localRow * 4;
        let tileCol = i32(localId.x);
        let globalRow = i32(globalId.y) * 4;
        let globalCol = i32(globalId.x) * 4;
        var acc: array<vec4<f32>, 4>;
        acc[0] = vec4<f32>(0.0); acc[1] = vec4<f32>(0.0);
        acc[2] = vec4<f32>(0.0); acc[3] = vec4<f32>(0.0);
        let numTiles = (K + 31) / 32;
        var kStart = 0;
        let tileRowB = localRow * 4;
        for (var t = 0; t < numTiles; t++) {
          for (var innerRow = 0; innerRow < 4; innerRow++) {
            let inputRow = tileRow + innerRow;
            let aRow = globalRow + innerRow;
            let aColVec4 = (kStart + tileCol * 4) / 4;
            if (aRow < M && aColVec4 < KVec4) {
              mm_Asub[inputRow][tileCol] = A[aRow * KVec4 + aColVec4];
            } else {
              mm_Asub[inputRow][tileCol] = vec4<f32>(0.0);
            }
          }
          for (var innerRow = 0; innerRow < 4; innerRow++) {
            let inputRow = tileRowB + innerRow;
            let bRow = kStart + inputRow;
            let bColVec4 = globalCol / 4;
            if (bRow < K && bColVec4 < NVec4) {
              mm_Bsub[inputRow][tileCol] = B[bRow * NVec4 + bColVec4];
            } else {
              mm_Bsub[inputRow][tileCol] = vec4<f32>(0.0);
            }
          }
          kStart = kStart + 32;
          workgroupBarrier();
          for (var k = 0; k < 8; k++) {
            let BCached0 = mm_Bsub[k * 4 + 0][tileCol];
            let BCached1 = mm_Bsub[k * 4 + 1][tileCol];
            let BCached2 = mm_Bsub[k * 4 + 2][tileCol];
            let BCached3 = mm_Bsub[k * 4 + 3][tileCol];
            for (var i = 0; i < 4; i++) {
              let ACached = mm_Asub[tileRow + i][k];
              acc[i] = fma(BCached0, vec4<f32>(ACached[0]), acc[i]);
              acc[i] = fma(BCached1, vec4<f32>(ACached[1]), acc[i]);
              acc[i] = fma(BCached2, vec4<f32>(ACached[2]), acc[i]);
              acc[i] = fma(BCached3, vec4<f32>(ACached[3]), acc[i]);
            }
          }
          workgroupBarrier();
        }
        for (var innerRow = 0; innerRow < 4; innerRow++) {
          let outRow = globalRow + innerRow;
          let outColVec4 = globalCol / 4;
          if (outRow < M && outColVec4 < NVec4) {
            C[outRow * NVec4 + outColVec4] = acc[innerRow];
          }
        }
      }
    `;

    let pipeline = null;

    // Buffer pool (tfjs-style)
    class BufferPool {
      constructor() {
        this.free = new Map();
      }
      getKey(size, usage) {
        return `${size}_${usage}`;
      }
      acquire(size, usage) {
        const key = this.getKey(size, usage);
        if (!this.free.has(key)) this.free.set(key, []);
        const list = this.free.get(key);
        if (list.length > 0) {
          return list.pop();
        }
        return device.createBuffer({ size, usage });
      }
      release(buffer) {
        const key = this.getKey(buffer.size, buffer.usage);
        if (!this.free.has(key)) this.free.set(key, []);
        this.free.get(key).push(buffer);
      }
    }

    const pool = new BufferPool();

    async function initWebGPU() {
      const adapter = await navigator.gpu.requestAdapter();
      device = await adapter.requestDevice({
        requiredLimits: { maxStorageBufferBindingSize: 1024*1024*1024, maxBufferSize: 1024*1024*1024 }
      });
      const module = device.createShaderModule({ code: SHADER });
      pipeline = device.createComputePipeline({ layout: 'auto', compute: { module, entryPoint: 'main' } });
    }

    // Method A: No pooling (create/destroy each call)
    async function runNoPool(M, K, N, aData, bData) {
      const uniformBuffer = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, 0]));

      const aBuffer = device.createBuffer({ size: aData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(aBuffer, 0, aData);

      const bBuffer = device.createBuffer({ size: bData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(bBuffer, 0, bData);

      const cBuffer = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
      const stagingBuffer = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: bBuffer } },
          { binding: 3, resource: { buffer: cBuffer } },
        ],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(Math.ceil(N / 32), Math.ceil(M / 32));
      pass.end();
      commandEncoder.copyBufferToBuffer(cBuffer, 0, stagingBuffer, 0, M * N * 4);
      device.queue.submit([commandEncoder.finish()]);

      await stagingBuffer.mapAsync(GPUMapMode.READ);
      stagingBuffer.getMappedRange();
      stagingBuffer.unmap();

      // DESTROY all buffers (no pooling)
      uniformBuffer.destroy();
      aBuffer.destroy();
      bBuffer.destroy();
      cBuffer.destroy();
      stagingBuffer.destroy();
    }

    // Method B: With pooling (reuse buffers)
    async function runWithPool(M, K, N, aData, bData) {
      const uniformBuffer = pool.acquire(16, GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST);
      device.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, 0]));

      const aBuffer = pool.acquire(aData.byteLength, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST);
      device.queue.writeBuffer(aBuffer, 0, aData);

      const bBuffer = pool.acquire(bData.byteLength, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST);
      device.queue.writeBuffer(bBuffer, 0, bData);

      const cBuffer = pool.acquire(M * N * 4, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC);

      // Staging buffer can't be reused easily due to map state
      const stagingBuffer = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: bBuffer } },
          { binding: 3, resource: { buffer: cBuffer } },
        ],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(Math.ceil(N / 32), Math.ceil(M / 32));
      pass.end();
      commandEncoder.copyBufferToBuffer(cBuffer, 0, stagingBuffer, 0, M * N * 4);
      device.queue.submit([commandEncoder.finish()]);

      await stagingBuffer.mapAsync(GPUMapMode.READ);
      stagingBuffer.getMappedRange();
      stagingBuffer.unmap();

      // RELEASE back to pool (not destroy)
      pool.release(uniformBuffer);
      pool.release(aBuffer);
      pool.release(bBuffer);
      pool.release(cBuffer);
      stagingBuffer.destroy();  // Staging always destroyed due to map state
    }

    async function runTest() {
      const results = document.getElementById('results');
      results.textContent = 'Initializing...\n';

      await initWebGPU();
      await tf.setBackend('webgpu');
      await tf.ready();

      const M = SIZE, K = SIZE, N = SIZE;
      const aData = new Float32Array(M * K);
      const bData = new Float32Array(K * N);
      for (let i = 0; i < M * K; i++) aData[i] = Math.random();
      for (let i = 0; i < K * N; i++) bData[i] = Math.random();

      results.textContent += `Testing ${SIZE}x${SIZE} matmul, ${RUNS} runs each\n\n`;

      // Method A: No pooling
      results.textContent += 'Method A: No buffer pooling (create/destroy each call)...\n';
      for (let i = 0; i < 5; i++) await runNoPool(M, K, N, aData, bData);
      const timesA = [];
      for (let i = 0; i < RUNS; i++) {
        const start = performance.now();
        await runNoPool(M, K, N, aData, bData);
        timesA.push(performance.now() - start);
      }
      const avgA = timesA.reduce((a, b) => a + b) / timesA.length;
      const gflopsA = (2 * M * N * K / (avgA / 1000)) / 1e9;
      results.textContent += `  Avg: ${avgA.toFixed(2)}ms, ${gflopsA.toFixed(0)} GFLOPS\n\n`;

      // Method B: With pooling
      results.textContent += 'Method B: With buffer pooling (reuse buffers)...\n';
      for (let i = 0; i < 5; i++) await runWithPool(M, K, N, aData, bData);
      const timesB = [];
      for (let i = 0; i < RUNS; i++) {
        const start = performance.now();
        await runWithPool(M, K, N, aData, bData);
        timesB.push(performance.now() - start);
      }
      const avgB = timesB.reduce((a, b) => a + b) / timesB.length;
      const gflopsB = (2 * M * N * K / (avgB / 1000)) / 1e9;
      results.textContent += `  Avg: ${avgB.toFixed(2)}ms, ${gflopsB.toFixed(0)} GFLOPS\n\n`;

      // Method C: tfjs reference
      results.textContent += 'Method C: tfjs with data()...\n';
      const a = tf.tensor2d(aData, [M, K]);
      const b = tf.tensor2d(bData, [K, N]);
      for (let i = 0; i < 5; i++) { const c = tf.matMul(a, b); await c.data(); c.dispose(); }
      const timesC = [];
      for (let i = 0; i < RUNS; i++) {
        const start = performance.now();
        const c = tf.matMul(a, b);
        await c.data();
        c.dispose();
        timesC.push(performance.now() - start);
      }
      const avgC = timesC.reduce((a, b) => a + b) / timesC.length;
      const gflopsC = (2 * M * N * K / (avgC / 1000)) / 1e9;
      results.textContent += `  Avg: ${avgC.toFixed(2)}ms, ${gflopsC.toFixed(0)} GFLOPS\n\n`;

      a.dispose(); b.dispose();

      results.textContent += '=== Summary ===\n';
      results.textContent += `No pooling:     ${avgA.toFixed(2)}ms (${gflopsA.toFixed(0)} GFLOPS)\n`;
      results.textContent += `With pooling:   ${avgB.toFixed(2)}ms (${gflopsB.toFixed(0)} GFLOPS)\n`;
      results.textContent += `tfjs (data):    ${avgC.toFixed(2)}ms (${gflopsC.toFixed(0)} GFLOPS)\n`;
      results.textContent += `\nPooling speedup: ${(avgA / avgB).toFixed(2)}x\n`;
      results.textContent += `Pooled vs tfjs: ${(avgC / avgB).toFixed(2)}x\n`;
    }
  </script>
</body>
</html>
