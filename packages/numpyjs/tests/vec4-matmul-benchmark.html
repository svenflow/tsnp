<!DOCTYPE html>
<html>
<head>
  <title>Vec4 Matmul Benchmark</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; }
    h2 { color: #00ff88; margin-top: 30px; }
    .status {
      padding: 10px 20px;
      background: #0f3460;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    button {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button:hover { background: #00b8d4; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #333;
    }
    th { background: #0f3460; text-align: left; }
    td:first-child { text-align: left; }
    .winner { background: #1a3a1a; }
    .loser { background: #3a1a1a; }
    .info { background: #0f3460; padding: 15px 20px; border-radius: 8px; margin: 20px 0; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Vec4 Optimized Matmul</h1>
  <p>Using vec4 loads/stores and inner-loop vectorization</p>

  <div class="info">
    <strong>Environment:</strong> <span id="env">Checking...</span><br>
    <strong>GPU:</strong> <span id="gpu">Checking...</span><br>
    <strong>WebGPU:</strong> <span id="webgpu-status">Checking...</span>
  </div>

  <div class="status" id="status">Ready</div>

  <button onclick="runBenchmark()">Run Benchmark</button>
  <button onclick="runCorrectness()">Verify Correctness</button>

  <div id="results"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu/dist/tf-backend-webgpu.min.js"></script>

  <script type="module">
    const WARMUP_RUNS = 5;
    const BENCHMARK_RUNS = 15;
    const SIZES = [512, 1024, 2048, 4096];

    let gpuDevice = null;
    const shaderCache = new Map();

    document.getElementById('env').textContent =
      `Chrome ${navigator.userAgent.match(/Chrome\/(\d+)/)?.[1] || 'unknown'}` +
      (navigator.userAgent.includes('HeadlessChrome') ? ' (Headless/Playwright)' : ' (Native)');

    // ============ Vec4 Optimized Shader ============
    // Key optimizations:
    // 1. vec4 memory loads (4x bandwidth efficiency)
    // 2. 4x4 outputs per thread like tfjs
    // 3. Efficient register usage with vec4 accumulators
    // 4. Unrolled inner k loop
    //
    // Memory layout: A is MxK (row-major), B is KxN stored as Kx(N/4) vec4s
    const VEC4_MATMUL_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, NVec4: u32, }

      // Tile: 64x64 output per workgroup, 16x16 threads = 256 threads
      // Each thread computes 4x4 outputs
      const TILE_M: u32 = 64u;
      const TILE_N: u32 = 64u;
      const TILE_K: u32 = 16u;  // Inner loop tile

      const ROW_PER_THREAD: u32 = 4u;
      const COL_PER_THREAD: u32 = 4u;  // actually vec4, so 16 outputs per thread

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<vec4<f32>>;  // B stored as vec4s
      @group(0) @binding(3) var<storage, read_write> C: array<vec4<f32>>;  // C stored as vec4s

      // Shared memory: A tile is 64 rows x 16 cols = 1024 floats = 4KB
      // B tile is 16 rows x 16 vec4s = 256 vec4s = 4KB
      // Total = 8KB, well under 16KB limit
      var<workgroup> mm_Asub: array<f32, 1040>;  // 64 * 17 for padding
      var<workgroup> mm_Bsub: array<vec4<f32>, 272>;  // 16 * 17 for padding

      const A_PADDED_ROW: u32 = 65u;
      const B_PADDED_COL: u32 = 17u;

      @compute @workgroup_size(16, 16)
      fn main(
        @builtin(local_invocation_id) lid: vec3<u32>,
        @builtin(workgroup_id) wid: vec3<u32>
      ) {
        let K = uniforms.K;
        let NVec4 = uniforms.NVec4;
        let N = uniforms.N;
        let M = uniforms.M;

        let tx = lid.x;
        let ty = lid.y;
        let tid = ty * 16u + tx;

        // Output position (4 rows x 1 vec4 per thread)
        let tileRow = ty * ROW_PER_THREAD;
        let tileColVec4 = tx;  // Each thread handles one vec4 column

        let globalRowStart = wid.y * TILE_M + tileRow;
        let globalColVec4 = wid.x * 16u + tileColVec4;

        // Accumulators: 4 rows x 1 vec4 = 4 vec4s = 16 values
        var acc0: vec4<f32> = vec4<f32>(0.0);
        var acc1: vec4<f32> = vec4<f32>(0.0);
        var acc2: vec4<f32> = vec4<f32>(0.0);
        var acc3: vec4<f32> = vec4<f32>(0.0);

        let numTiles = K / TILE_K;

        for (var t: u32 = 0u; t < numTiles; t++) {
          // ===== Load A tile: 256 threads, 1040 elements = ~4 per thread =====
          for (var i: u32 = 0u; i < 5u; i++) {
            let idx = tid * 5u + i;
            if (idx < 1040u) {
              let loadK = idx / 64u;  // 0..16
              let loadRow = idx % 64u;  // 0..63
              let globalARow = wid.y * TILE_M + loadRow;
              let globalACol = t * TILE_K + loadK;
              mm_Asub[loadK * A_PADDED_ROW + loadRow] = A[globalARow * K + globalACol];
            }
          }

          // ===== Load B tile: 256 threads, 272 vec4s = ~1 per thread =====
          if (tid < 272u) {
            let loadK = tid / 16u;  // 0..16
            let loadColVec4 = tid % 16u;  // 0..15
            let globalBK = t * TILE_K + loadK;
            let globalBColVec4 = wid.x * 16u + loadColVec4;
            mm_Bsub[loadK * B_PADDED_COL + loadColVec4] = B[globalBK * NVec4 + globalBColVec4];
          }

          workgroupBarrier();

          // ===== Compute 4 rows x 1 vec4 outputs =====
          // Unroll k loop for better instruction-level parallelism
          for (var k: u32 = 0u; k < TILE_K; k++) {
            let a0 = mm_Asub[k * A_PADDED_ROW + tileRow + 0u];
            let a1 = mm_Asub[k * A_PADDED_ROW + tileRow + 1u];
            let a2 = mm_Asub[k * A_PADDED_ROW + tileRow + 2u];
            let a3 = mm_Asub[k * A_PADDED_ROW + tileRow + 3u];
            let b = mm_Bsub[k * B_PADDED_COL + tileColVec4];

            acc0 = fma(vec4<f32>(a0), b, acc0);
            acc1 = fma(vec4<f32>(a1), b, acc1);
            acc2 = fma(vec4<f32>(a2), b, acc2);
            acc3 = fma(vec4<f32>(a3), b, acc3);
          }

          workgroupBarrier();
        }

        // ===== Write outputs =====
        C[(globalRowStart + 0u) * NVec4 + globalColVec4] = acc0;
        C[(globalRowStart + 1u) * NVec4 + globalColVec4] = acc1;
        C[(globalRowStart + 2u) * NVec4 + globalColVec4] = acc2;
        C[(globalRowStart + 3u) * NVec4 + globalColVec4] = acc3;
      }
    `;

    // ============ WebGPU Init ============
    async function initWebGPU() {
      if (!navigator.gpu) throw new Error('WebGPU not supported');
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) throw new Error('No WebGPU adapter');
      gpuDevice = await adapter.requestDevice({
        requiredLimits: { maxStorageBufferBindingSize: 1024 * 1024 * 1024, maxBufferSize: 1024 * 1024 * 1024 }
      });
      document.getElementById('gpu').textContent = adapter.name || 'Unknown';
      document.getElementById('webgpu-status').textContent = 'READY';
      return gpuDevice;
    }

    // ============ rumpy matmul ============
    async function rumpyMatmul(M, K, N, aData, bData) {
      const NVec4 = N / 4;

      const uniformBuffer = gpuDevice.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, NVec4]));

      const aBuffer = gpuDevice.createBuffer({ size: aData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(aBuffer, 0, aData);

      const bBuffer = gpuDevice.createBuffer({ size: bData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(bBuffer, 0, bData);

      const cBuffer = gpuDevice.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

      let pipeline = shaderCache.get('vec4');
      if (!pipeline) {
        const module = gpuDevice.createShaderModule({ code: VEC4_MATMUL_SHADER });
        pipeline = gpuDevice.createComputePipeline({ layout: 'auto', compute: { module, entryPoint: 'main' } });
        shaderCache.set('vec4', pipeline);
      }

      const bindGroup = gpuDevice.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: bBuffer } },
          { binding: 3, resource: { buffer: cBuffer } },
        ],
      });

      const commandEncoder = gpuDevice.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      // Dispatch: each workgroup handles 64x64 output tile
      // 64 rows / workgroup, N/4 vec4s = N outputs
      // dispatch: (N/64, M/64)
      pass.dispatchWorkgroups(N / 64, M / 64);
      pass.end();

      const stagingBuffer = gpuDevice.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
      commandEncoder.copyBufferToBuffer(cBuffer, 0, stagingBuffer, 0, M * N * 4);
      gpuDevice.queue.submit([commandEncoder.finish()]);
      await stagingBuffer.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(stagingBuffer.getMappedRange().slice(0));
      stagingBuffer.unmap();

      uniformBuffer.destroy(); aBuffer.destroy(); bBuffer.destroy(); cBuffer.destroy(); stagingBuffer.destroy();
      return result;
    }

    // ============ CPU Reference ============
    function cpuMatmul(M, K, N, aData, bData) {
      const result = new Float32Array(M * N);
      for (let m = 0; m < M; m++) {
        for (let n = 0; n < N; n++) {
          let sum = 0;
          for (let k = 0; k < K; k++) {
            sum += aData[m * K + k] * bData[k * N + n];
          }
          result[m * N + n] = sum;
        }
      }
      return result;
    }

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function median(arr) {
      const sorted = [...arr].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    async function runCorrectness() {
      await initWebGPU();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<h2>Testing Correctness...</h2>';

      const testSizes = [64, 128, 256, 512, 1024];
      let html = '<h2>Correctness Results</h2>';

      for (const size of testSizes) {
        setStatus(`Testing ${size}x${size}...`);
        const M = size, K = size, N = size;

        const aData = new Float32Array(M * K);
        const bData = new Float32Array(K * N);
        for (let i = 0; i < M * K; i++) aData[i] = (i % 17) * 0.1 - 0.8;
        for (let i = 0; i < K * N; i++) bData[i] = (i % 13) * 0.1 - 0.6;

        const cpuResult = cpuMatmul(M, K, N, aData, bData);
        const gpuResult = await rumpyMatmul(M, K, N, aData, bData);

        let maxRelError = 0;
        let errorIdx = -1;
        for (let i = 0; i < M * N; i++) {
          const cpu = cpuResult[i];
          const gpu = gpuResult[i];
          const absErr = Math.abs(cpu - gpu);
          const relErr = Math.abs(cpu) > 1e-6 ? absErr / Math.abs(cpu) : absErr;
          if (relErr > maxRelError) {
            maxRelError = relErr;
            errorIdx = i;
          }
        }

        const passed = maxRelError < 0.01;
        html += `<p>${size}x${size}: ${passed ? '✓ PASS' : '✗ FAIL'} (max relative error: ${(maxRelError * 100).toFixed(4)}%`;
        if (!passed && errorIdx >= 0) {
          html += `, at idx ${errorIdx}: CPU=${cpuResult[errorIdx].toFixed(4)}, GPU=${gpuResult[errorIdx].toFixed(4)}`;
        }
        html += `)</p>`;
        html += `<p style="font-size: 11px; color: #888;">First 5 GPU: [${Array.from(gpuResult.slice(0, 5)).map(x => x.toFixed(4)).join(', ')}]</p>`;
        html += `<p style="font-size: 11px; color: #888;">First 5 CPU: [${Array.from(cpuResult.slice(0, 5)).map(x => x.toFixed(4)).join(', ')}]</p>`;
      }

      resultsDiv.innerHTML = html;
      setStatus('Complete!');
    }

    async function runBenchmark() {
      await initWebGPU();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<h2>Running Benchmark...</h2>';

      // Init tfjs
      try {
        await tf.setBackend('webgpu');
        await tf.ready();
      } catch (e) {
        resultsDiv.innerHTML = `<h2>Error: tfjs init failed</h2><p>${e}</p>`;
        return;
      }

      let html = '<h2>Benchmark Results</h2>';
      html += '<table><tr><th>Size</th><th>rumpy (ms)</th><th>rumpy GFLOPS</th><th>tfjs (ms)</th><th>tfjs GFLOPS</th><th>Winner</th></tr>';

      for (const size of SIZES) {
        setStatus(`Benchmarking ${size}x${size}...`);
        const M = size, K = size, N = size;
        const flops = 2 * M * N * K;

        const aData = new Float32Array(M * K);
        const bData = new Float32Array(K * N);
        for (let i = 0; i < M * K; i++) aData[i] = Math.random();
        for (let i = 0; i < K * N; i++) bData[i] = Math.random();

        // Warmup rumpy
        for (let i = 0; i < WARMUP_RUNS; i++) await rumpyMatmul(M, K, N, aData, bData);
        await sleep(100);

        // Benchmark rumpy
        const rumpyTimes = [];
        for (let i = 0; i < BENCHMARK_RUNS; i++) {
          const start = performance.now();
          await rumpyMatmul(M, K, N, aData, bData);
          rumpyTimes.push(performance.now() - start);
        }
        await sleep(100);

        // Warmup tfjs
        const a = tf.tensor2d(aData, [M, K]);
        const b = tf.tensor2d(bData, [K, N]);
        for (let i = 0; i < WARMUP_RUNS; i++) {
          const c = tf.matMul(a, b);
          await c.data();
          c.dispose();
        }
        await sleep(100);

        // Benchmark tfjs
        const tfjsTimes = [];
        for (let i = 0; i < BENCHMARK_RUNS; i++) {
          const start = performance.now();
          const c = tf.matMul(a, b);
          await c.data();
          c.dispose();
          tfjsTimes.push(performance.now() - start);
        }
        a.dispose();
        b.dispose();

        const rumpyMedian = median(rumpyTimes);
        const tfjsMedian = median(tfjsTimes);
        const rumpyGflops = (flops / (rumpyMedian / 1000)) / 1e9;
        const tfjsGflops = (flops / (tfjsMedian / 1000)) / 1e9;

        const winner = rumpyMedian < tfjsMedian ? 'rumpy' : 'tfjs';
        const ratio = winner === 'rumpy'
          ? (tfjsMedian / rumpyMedian).toFixed(2)
          : (rumpyMedian / tfjsMedian).toFixed(2);

        html += `<tr class="${winner === 'rumpy' ? 'winner' : 'loser'}">`;
        html += `<td>${size}x${size}</td>`;
        html += `<td>${rumpyMedian.toFixed(2)}</td>`;
        html += `<td>${rumpyGflops.toFixed(0)}</td>`;
        html += `<td>${tfjsMedian.toFixed(2)}</td>`;
        html += `<td>${tfjsGflops.toFixed(0)}</td>`;
        html += `<td><strong>${winner}</strong> ${ratio}x</td>`;
        html += '</tr>';

        await sleep(200);
      }

      html += '</table>';
      resultsDiv.innerHTML = html;
      setStatus('Complete!');
    }

    window.runBenchmark = runBenchmark;
    window.runCorrectness = runCorrectness;

    initWebGPU().catch(e => {
      document.getElementById('webgpu-status').textContent = 'FAILED: ' + e.message;
    });
  </script>
</body>
</html>
