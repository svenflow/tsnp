<!DOCTYPE html>
<html>
<head>
  <title>Multi-Shader Matmul - Beat tfjs at ALL sizes</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; }
    h2 { color: #00ff88; margin-top: 30px; }
    .status {
      padding: 10px 20px;
      background: #0f3460;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    button {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button:hover { background: #00b8d4; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #333;
    }
    th { background: #0f3460; text-align: left; }
    td:first-child { text-align: left; }
    .winner { background: #1a3a1a; }
    .loser { background: #3a1a1a; }
    .best { color: #0f8; font-weight: bold; }
    .info { background: #0f3460; padding: 15px 20px; border-radius: 8px; margin: 20px 0; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Multi-Shader Matmul Autotune</h1>
  <p>Testing multiple shader variants to beat tfjs at ALL sizes</p>

  <div class="info">
    <strong>Environment:</strong> <span id="env">Checking...</span><br>
    <strong>GPU:</strong> <span id="gpu">Checking...</span><br>
    <strong>WebGPU:</strong> <span id="webgpu-status">Checking...</span>
  </div>

  <div class="status" id="status">Ready</div>

  <button onclick="runFullAutotune()">Run Full Autotune</button>
  <button onclick="runQuickTest(512)">Test 512</button>
  <button onclick="runQuickTest(1024)">Test 1024</button>
  <button onclick="runQuickTest(2048)">Test 2048</button>
  <button onclick="runQuickTest(4096)">Test 4096</button>

  <div id="results"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu/dist/tf-backend-webgpu.min.js"></script>

  <script type="module">
    const WARMUP_RUNS = 5;
    const BENCHMARK_RUNS = 10;
    const SIZES = [512, 1024, 2048, 4096];

    let gpuDevice = null;
    const shaderCache = new Map();

    document.getElementById('env').textContent =
      `Chrome ${navigator.userAgent.match(/Chrome\/(\d+)/)?.[1] || 'unknown'}` +
      (navigator.userAgent.includes('HeadlessChrome') ? ' (Headless/Playwright)' : ' (Native)');

    // ============ SHADER COLLECTION ============

    // === SMALL-16: Best for 512x512 ===
    // 16x16 tiles, scalar loads, 16x16 workgroup
    const SMALL_16_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, _pad: u32, }
      const TILE: u32 = 16u;
      const TILE_PAD: u32 = 17u;

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<f32>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;

      var<workgroup> As: array<f32, 272>;
      var<workgroup> Bs: array<f32, 272>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let K = uniforms.K;
        let N = uniforms.N;
        let tx = lid.x;
        let ty = lid.y;

        let gRow = wid.y * TILE + ty;
        let gCol = wid.x * TILE + tx;

        var acc: f32 = 0.0;
        let numTiles = K / TILE;

        for (var t: u32 = 0u; t < numTiles; t++) {
          As[ty * TILE_PAD + tx] = A[gRow * K + t * TILE + tx];
          Bs[ty * TILE_PAD + tx] = B[(t * TILE + ty) * N + gCol];
          workgroupBarrier();

          for (var k: u32 = 0u; k < TILE; k++) {
            acc = fma(As[ty * TILE_PAD + k], Bs[k * TILE_PAD + tx], acc);
          }
          workgroupBarrier();
        }

        C[gRow * N + gCol] = acc;
      }
    `;

    // === MEDIUM-32: Best for 1024x1024 ===
    // 32x32 tiles, 4x4 outputs per thread, 8x8 workgroup
    const MEDIUM_32_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, _pad: u32, }
      const TILE_M: u32 = 32u;
      const TILE_N: u32 = 32u;
      const TILE_K: u32 = 32u;
      const ROW_PER_THREAD: u32 = 4u;
      const COL_PER_THREAD: u32 = 4u;

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<f32>;
      @group(0) @binding(3) var<storage, read_write> C: array<f32>;

      var<workgroup> As: array<array<f32, 33>, 32>;
      var<workgroup> Bs: array<array<f32, 33>, 32>;

      @compute @workgroup_size(8, 8)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let K = uniforms.K;
        let N = uniforms.N;

        let tileRow = lid.y * ROW_PER_THREAD;
        let tileCol = lid.x * COL_PER_THREAD;

        let gRowStart = wid.y * TILE_M + tileRow;
        let gColStart = wid.x * TILE_N + tileCol;

        var acc: array<array<f32, 4>, 4>;
        for (var i = 0u; i < 4u; i++) {
          for (var j = 0u; j < 4u; j++) {
            acc[i][j] = 0.0;
          }
        }

        let tid = lid.y * 8u + lid.x;
        let numTiles = K / TILE_K;

        for (var t: u32 = 0u; t < numTiles; t++) {
          // Load A: 64 threads, 1024 elements = 16 per thread
          for (var i = 0u; i < 16u; i++) {
            let idx = tid * 16u + i;
            let row = idx % 32u;
            let kOff = idx / 32u;
            let gRow = wid.y * TILE_M + row;
            let gK = t * TILE_K + kOff;
            As[kOff][row] = A[gRow * K + gK];
          }

          // Load B: same pattern
          for (var i = 0u; i < 16u; i++) {
            let idx = tid * 16u + i;
            let kOff = idx / 32u;
            let col = idx % 32u;
            let gK = t * TILE_K + kOff;
            let gCol = wid.x * TILE_N + col;
            Bs[kOff][col] = B[gK * N + gCol];
          }

          workgroupBarrier();

          for (var k = 0u; k < TILE_K; k++) {
            var BCached: array<f32, 4>;
            for (var j = 0u; j < 4u; j++) {
              BCached[j] = Bs[k][tileCol + j];
            }
            for (var i = 0u; i < 4u; i++) {
              let AVal = As[k][tileRow + i];
              for (var j = 0u; j < 4u; j++) {
                acc[i][j] = fma(AVal, BCached[j], acc[i][j]);
              }
            }
          }

          workgroupBarrier();
        }

        for (var i = 0u; i < 4u; i++) {
          for (var j = 0u; j < 4u; j++) {
            C[(gRowStart + i) * N + gColStart + j] = acc[i][j];
          }
        }
      }
    `;

    // === LARGE-64-VEC4: Best for 4096x4096 ===
    // 64x64 tiles, vec4 loads, 16x16 workgroup
    const LARGE_64_VEC4_SHADER = `
      struct Uniforms { M: u32, K: u32, N: u32, NVec4: u32, }
      const TILE_M: u32 = 64u;
      const TILE_N: u32 = 64u;
      const TILE_K: u32 = 16u;
      const A_PAD: u32 = 65u;
      const B_PAD: u32 = 17u;

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read> B: array<vec4<f32>>;
      @group(0) @binding(3) var<storage, read_write> C: array<vec4<f32>>;

      var<workgroup> As: array<f32, 1040>;
      var<workgroup> Bs: array<vec4<f32>, 272>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let K = uniforms.K;
        let NVec4 = uniforms.NVec4;
        let tx = lid.x;
        let ty = lid.y;
        let tid = ty * 16u + tx;

        let tileRow = ty * 4u;
        let tileColVec4 = tx;
        let gRowStart = wid.y * TILE_M + tileRow;
        let gColVec4 = wid.x * 16u + tileColVec4;

        var acc0: vec4<f32> = vec4<f32>(0.0);
        var acc1: vec4<f32> = vec4<f32>(0.0);
        var acc2: vec4<f32> = vec4<f32>(0.0);
        var acc3: vec4<f32> = vec4<f32>(0.0);

        let numTiles = K / TILE_K;

        for (var t: u32 = 0u; t < numTiles; t++) {
          for (var i: u32 = 0u; i < 5u; i++) {
            let idx = tid * 5u + i;
            if (idx < 1040u) {
              let loadK = idx / 64u;
              let loadRow = idx % 64u;
              let gRow = wid.y * TILE_M + loadRow;
              let gK = t * TILE_K + loadK;
              As[loadK * A_PAD + loadRow] = A[gRow * K + gK];
            }
          }

          if (tid < 272u) {
            let loadK = tid / 16u;
            let loadColVec4 = tid % 16u;
            let gK = t * TILE_K + loadK;
            let gColVec4 = wid.x * 16u + loadColVec4;
            Bs[loadK * B_PAD + loadColVec4] = B[gK * NVec4 + gColVec4];
          }

          workgroupBarrier();

          for (var k: u32 = 0u; k < TILE_K; k++) {
            let a0 = As[k * A_PAD + tileRow + 0u];
            let a1 = As[k * A_PAD + tileRow + 1u];
            let a2 = As[k * A_PAD + tileRow + 2u];
            let a3 = As[k * A_PAD + tileRow + 3u];
            let b = Bs[k * B_PAD + tileColVec4];

            acc0 = fma(vec4<f32>(a0), b, acc0);
            acc1 = fma(vec4<f32>(a1), b, acc1);
            acc2 = fma(vec4<f32>(a2), b, acc2);
            acc3 = fma(vec4<f32>(a3), b, acc3);
          }

          workgroupBarrier();
        }

        C[(gRowStart + 0u) * NVec4 + gColVec4] = acc0;
        C[(gRowStart + 1u) * NVec4 + gColVec4] = acc1;
        C[(gRowStart + 2u) * NVec4 + gColVec4] = acc2;
        C[(gRowStart + 3u) * NVec4 + gColVec4] = acc3;
      }
    `;

    const SHADERS = {
      'small-16': { code: SMALL_16_SHADER, tileM: 16, tileN: 16, usesVec4: false },
      'medium-32': { code: MEDIUM_32_SHADER, tileM: 32, tileN: 32, usesVec4: false },
      'large-64-vec4': { code: LARGE_64_VEC4_SHADER, tileM: 64, tileN: 64, usesVec4: true },
    };

    // ============ WebGPU Init ============
    async function initWebGPU() {
      if (!navigator.gpu) throw new Error('WebGPU not supported');
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) throw new Error('No WebGPU adapter');
      gpuDevice = await adapter.requestDevice({
        requiredLimits: { maxStorageBufferBindingSize: 1024 * 1024 * 1024, maxBufferSize: 1024 * 1024 * 1024 }
      });
      document.getElementById('gpu').textContent = adapter.name || 'Unknown';
      document.getElementById('webgpu-status').textContent = 'READY';
      return gpuDevice;
    }

    // ============ Matmul with specific shader ============
    async function rumpyMatmul(M, K, N, aData, bData, shaderName) {
      const shader = SHADERS[shaderName];
      const NVec4 = N / 4;

      const uniformBuffer = gpuDevice.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, NVec4]));

      const aBuffer = gpuDevice.createBuffer({ size: aData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(aBuffer, 0, aData);

      const bBuffer = gpuDevice.createBuffer({ size: bData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
      gpuDevice.queue.writeBuffer(bBuffer, 0, bData);

      const cBuffer = gpuDevice.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

      let pipeline = shaderCache.get(shaderName);
      if (!pipeline) {
        const module = gpuDevice.createShaderModule({ code: shader.code });
        pipeline = gpuDevice.createComputePipeline({ layout: 'auto', compute: { module, entryPoint: 'main' } });
        shaderCache.set(shaderName, pipeline);
      }

      const bindGroup = gpuDevice.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: bBuffer } },
          { binding: 3, resource: { buffer: cBuffer } },
        ],
      });

      const commandEncoder = gpuDevice.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);

      const dispatchX = shader.usesVec4 ? N / shader.tileN : N / shader.tileN;
      const dispatchY = M / shader.tileM;
      pass.dispatchWorkgroups(dispatchX, dispatchY);
      pass.end();

      const stagingBuffer = gpuDevice.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
      commandEncoder.copyBufferToBuffer(cBuffer, 0, stagingBuffer, 0, M * N * 4);
      gpuDevice.queue.submit([commandEncoder.finish()]);
      await stagingBuffer.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(stagingBuffer.getMappedRange().slice(0));
      stagingBuffer.unmap();

      uniformBuffer.destroy(); aBuffer.destroy(); bBuffer.destroy(); cBuffer.destroy(); stagingBuffer.destroy();
      return result;
    }

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function median(arr) {
      const sorted = [...arr].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    async function benchmarkShader(size, shaderName) {
      const M = size, K = size, N = size;
      const flops = 2 * M * N * K;

      const aData = new Float32Array(M * K);
      const bData = new Float32Array(K * N);
      for (let i = 0; i < M * K; i++) aData[i] = Math.random();
      for (let i = 0; i < K * N; i++) bData[i] = Math.random();

      // Warmup
      for (let i = 0; i < WARMUP_RUNS; i++) await rumpyMatmul(M, K, N, aData, bData, shaderName);
      await sleep(50);

      // Benchmark
      const times = [];
      for (let i = 0; i < BENCHMARK_RUNS; i++) {
        const start = performance.now();
        await rumpyMatmul(M, K, N, aData, bData, shaderName);
        times.push(performance.now() - start);
      }

      const medMs = median(times);
      const gflops = (flops / (medMs / 1000)) / 1e9;
      return { ms: medMs, gflops };
    }

    async function benchmarkTfjs(size) {
      try {
        await tf.setBackend('webgpu');
        await tf.ready();
      } catch (e) {
        return null;
      }

      const M = size, K = size, N = size;
      const flops = 2 * M * N * K;

      const aData = new Float32Array(M * K);
      const bData = new Float32Array(K * N);
      for (let i = 0; i < M * K; i++) aData[i] = Math.random();
      for (let i = 0; i < K * N; i++) bData[i] = Math.random();

      const a = tf.tensor2d(aData, [M, K]);
      const b = tf.tensor2d(bData, [K, N]);

      // Warmup
      for (let i = 0; i < WARMUP_RUNS; i++) {
        const c = tf.matMul(a, b);
        await c.data();
        c.dispose();
      }
      await sleep(50);

      // Benchmark
      const times = [];
      for (let i = 0; i < BENCHMARK_RUNS; i++) {
        const start = performance.now();
        const c = tf.matMul(a, b);
        await c.data();
        c.dispose();
        times.push(performance.now() - start);
      }

      a.dispose();
      b.dispose();

      const medMs = median(times);
      const gflops = (flops / (medMs / 1000)) / 1e9;
      return { ms: medMs, gflops };
    }

    async function runQuickTest(size) {
      await initWebGPU();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<h2>Testing ${size}x${size}...</h2>`;

      let html = `<h2>${size}x${size} Results</h2>`;
      html += '<table><tr><th>Shader</th><th>ms</th><th>GFLOPS</th></tr>';

      for (const name of Object.keys(SHADERS)) {
        setStatus(`Testing ${name}...`);
        const r = await benchmarkShader(size, name);
        html += `<tr><td>${name}</td><td>${r.ms.toFixed(2)}</td><td>${r.gflops.toFixed(0)}</td></tr>`;
      }

      setStatus('Testing tfjs...');
      const tfjs = await benchmarkTfjs(size);
      html += `<tr style="background:#0f3460"><td>tfjs</td><td>${tfjs.ms.toFixed(2)}</td><td>${tfjs.gflops.toFixed(0)}</td></tr>`;
      html += '</table>';

      resultsDiv.innerHTML = html;
      setStatus('Complete!');
    }

    async function runFullAutotune() {
      await initWebGPU();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<h2>Running Full Autotune...</h2>';

      let html = '<h2>Full Comparison</h2>';
      html += '<table><tr><th>Size</th>';
      for (const name of Object.keys(SHADERS)) {
        html += `<th>${name}</th>`;
      }
      html += '<th>Best rumpy</th><th>tfjs</th><th>vs tfjs</th></tr>';

      const optimalShaders = {};

      for (const size of SIZES) {
        setStatus(`Benchmarking ${size}x${size}...`);

        const results = {};
        for (const name of Object.keys(SHADERS)) {
          results[name] = await benchmarkShader(size, name);
        }

        const tfjs = await benchmarkTfjs(size);

        // Find best rumpy shader
        let best = null;
        for (const name of Object.keys(SHADERS)) {
          if (!best || results[name].gflops > results[best].gflops) {
            best = name;
          }
        }
        optimalShaders[size] = best;

        const bestGflops = results[best].gflops;
        const winner = bestGflops > tfjs.gflops ? 'rumpy' : 'tfjs';
        const ratio = winner === 'rumpy'
          ? (bestGflops / tfjs.gflops).toFixed(2)
          : (tfjs.gflops / bestGflops).toFixed(2);

        html += `<tr class="${winner === 'rumpy' ? 'winner' : 'loser'}">`;
        html += `<td>${size}x${size}</td>`;

        for (const name of Object.keys(SHADERS)) {
          const r = results[name];
          const isBest = name === best;
          html += `<td ${isBest ? 'class="best"' : ''}>${r.gflops.toFixed(0)}</td>`;
        }

        html += `<td class="best">${best}</td>`;
        html += `<td>${tfjs.gflops.toFixed(0)}</td>`;
        html += `<td><strong>${winner}</strong> ${ratio}x</td>`;
        html += '</tr>';

        await sleep(100);
      }

      html += '</table>';

      html += '<h2>Optimal Shader Selection</h2><pre>';
      for (const size of SIZES) {
        html += `${size}x${size}: ${optimalShaders[size]}\n`;
      }
      html += '</pre>';

      resultsDiv.innerHTML = html;
      setStatus('Complete!');
    }

    window.runFullAutotune = runFullAutotune;
    window.runQuickTest = runQuickTest;

    initWebGPU().catch(e => {
      document.getElementById('webgpu-status').textContent = 'FAILED: ' + e.message;
    });
  </script>
</body>
</html>
