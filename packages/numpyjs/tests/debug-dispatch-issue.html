<!DOCTYPE html>
<html>
<head>
  <title>Debug: Dispatch Size Investigation</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    .pass { color: #0f8; }
    .fail { color: #f55; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; white-space: pre-wrap; }
    button { background: #00d9ff; color: #1a1a2e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>
  <h1>Debug: Dispatch and Buffer Size Investigation</h1>
  <button onclick="runTests()">Run Tests</button>
  <pre id="output">Click to run...</pre>

  <script type="module">
    let device = null;
    const log = (msg) => { document.getElementById('output').textContent += msg + '\n'; };

    async function init() {
      const adapter = await navigator.gpu.requestAdapter();
      device = await adapter.requestDevice();
      log('WebGPU initialized');
    }

    // Test: Various shared memory sizes
    function makeSharedTest(sharedSize) {
      return `
        @group(0) @binding(0) var<storage, read_write> output: array<f32>;
        var<workgroup> shared: array<f32, ${sharedSize}>;

        @compute @workgroup_size(16, 16)
        fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(global_invocation_id) gid: vec3<u32>) {
          let tid = lid.y * 16u + lid.x;
          let g = gid.y * 16u + gid.x;

          // Write to shared
          if (tid < ${sharedSize}u) {
            shared[tid] = f32(tid) + 100.0;
          }
          workgroupBarrier();

          // Read from shared and write to output
          if (tid < ${sharedSize}u) {
            output[g] = shared[tid];
          } else {
            output[g] = 999.0;  // Indicator that thread ran but didn't use shared
          }
        }
      `;
    }

    // Test with double barrier
    function makeDoubleBarrierTest(sharedSize) {
      return `
        @group(0) @binding(0) var<storage, read_write> output: array<f32>;
        var<workgroup> shared: array<f32, ${sharedSize}>;

        @compute @workgroup_size(16, 16)
        fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(global_invocation_id) gid: vec3<u32>) {
          let tid = lid.y * 16u + lid.x;
          let g = gid.y * 16u + gid.x;

          // First barrier
          if (tid < ${sharedSize}u) {
            shared[tid] = f32(tid) + 100.0;
          }
          workgroupBarrier();

          // Read
          var val = shared[tid % ${sharedSize}u];
          workgroupBarrier();

          output[g] = val;
        }
      `;
    }

    async function runShader(name, code) {
      const outBuffer = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      const module = device.createShaderModule({ code });
      const pipeline = device.createComputePipeline({
        layout: 'auto',
        compute: { module, entryPoint: 'main' },
      });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [{ binding: 0, resource: { buffer: outBuffer } }],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(1, 1);  // 16x16 = 256 threads
      pass.end();

      const staging = device.createBuffer({
        size: 256 * 4,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(outBuffer, 0, staging, 0, 256 * 4);
      device.queue.submit([commandEncoder.finish()]);
      await staging.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(staging.getMappedRange().slice(0));
      staging.unmap();
      outBuffer.destroy();
      staging.destroy();

      const first10 = Array.from(result.slice(0, 10));
      const hasNonZero = first10.some(v => v !== 0);
      const status = hasNonZero ? 'PASS' : 'FAIL';
      log(`${name}: [${first10.map(v => v.toFixed(0)).join(', ')}] - ${status}`);
      return hasNonZero;
    }

    window.runTests = async function() {
      document.getElementById('output').textContent = '';
      log('Initializing...');
      await init();
      log('');

      log('=== Single Barrier Tests (vary shared size) ===');
      await runShader('Shared size 64', makeSharedTest(64));
      await runShader('Shared size 128', makeSharedTest(128));
      await runShader('Shared size 256', makeSharedTest(256));
      await runShader('Shared size 512', makeSharedTest(512));
      await runShader('Shared size 1024', makeSharedTest(1024));
      await runShader('Shared size 2048', makeSharedTest(2048));
      await runShader('Shared size 2080', makeSharedTest(2080));
      await runShader('Shared size 4096', makeSharedTest(4096));

      log('');
      log('=== Double Barrier Tests (vary shared size) ===');
      await runShader('Double barrier, size 64', makeDoubleBarrierTest(64));
      await runShader('Double barrier, size 128', makeDoubleBarrierTest(128));
      await runShader('Double barrier, size 256', makeDoubleBarrierTest(256));
      await runShader('Double barrier, size 512', makeDoubleBarrierTest(512));
      await runShader('Double barrier, size 1024', makeDoubleBarrierTest(1024));

      log('');
      log('=== Done ===');
    };
  </script>
</body>
</html>
