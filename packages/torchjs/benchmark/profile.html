<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>torchjs Op-Level Profiler</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1, h2 { color: #fff; }
    .section {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    pre {
      background: #333;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 600px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background: #45a049;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 12px;
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    th { background: #333; }
    .bar {
      background: #4CAF50;
      height: 16px;
      border-radius: 2px;
    }
    .bar-container {
      background: #333;
      width: 200px;
      border-radius: 2px;
    }
    .highlight { background: #3a3a3a; }
  </style>
</head>
<body>
  <h1>🔬 torchjs Op-Level Profiler</h1>

  <div class="section">
    <h2>Controls</h2>
    <button id="runProfile">Run Profile (10 iterations)</button>
    <button id="runSingle">Run Single</button>
  </div>

  <div class="section">
    <h2>Summary</h2>
    <div id="summary">Click a button to run profiler...</div>
  </div>

  <div class="section">
    <h2>Op Breakdown</h2>
    <table id="op-table">
      <thead>
        <tr>
          <th>Operation</th>
          <th>Count</th>
          <th>Total (ms)</th>
          <th>Avg (ms)</th>
          <th>% of Total</th>
          <th>Visual</th>
        </tr>
      </thead>
      <tbody id="op-tbody"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Detailed Timeline</h2>
    <pre id="timeline"></pre>
  </div>

  <script type="module">
    const summaryEl = document.getElementById('summary');
    const tbodyEl = document.getElementById('op-tbody');
    const timelineEl = document.getElementById('timeline');

    // Op profiling wrapper
    class OpProfiler {
      constructor() {
        this.ops = [];
        this.enabled = true;
      }

      clear() {
        this.ops = [];
      }

      record(name, durationMs) {
        if (this.enabled) {
          this.ops.push({ name, duration: durationMs });
        }
      }

      wrap(backend, name, originalFn) {
        const self = this;
        return function(...args) {
          const t0 = performance.now();
          const result = originalFn.apply(backend, args);
          const t1 = performance.now();
          self.record(name, t1 - t0);
          return result;
        };
      }

      getSummary() {
        const byOp = {};
        for (const op of this.ops) {
          if (!byOp[op.name]) {
            byOp[op.name] = { count: 0, total: 0 };
          }
          byOp[op.name].count++;
          byOp[op.name].total += op.duration;
        }
        return byOp;
      }

      getTotalTime() {
        return this.ops.reduce((sum, op) => sum + op.duration, 0);
      }
    }

    const profiler = new OpProfiler();

    async function runProfile(iterations = 10) {
      summaryEl.textContent = 'Loading...';
      tbodyEl.innerHTML = '';
      timelineEl.textContent = '';

      const torchjs = await import('/packages/torchjs/dist/index.mjs');

      // Load weights
      const [metaRes, binRes, inputRes] = await Promise.all([
        fetch('../../../BlazePalm/ML/converted/weights.json'),
        fetch('../../../BlazePalm/ML/converted/weights.bin'),
        fetch('../../../BlazePalm/ML/test_outputs/test_hand_input.bin'),
      ]);

      const metadata = await metaRes.json();
      const buffer = await binRes.arrayBuffer();
      const inputBuffer = await inputRes.arrayBuffer();

      const weights = torchjs.loadWeightsFromBuffer(metadata, buffer);
      const testInput = { data: new Float32Array(inputBuffer), shape: [1, 3, 256, 256] };

      summaryEl.textContent = `Loaded ${Object.keys(weights).length} weight tensors`;

      // Setup WebGPU
      const webgpuBackend = await torchjs.createWebGPUBackend();
      torchjs.setBackend(webgpuBackend);
      summaryEl.textContent += '\nWebGPU backend initialized';

      // Wrap backend methods with profiling
      const opsToProfile = [
        'relu', 'relu6', 'sigmoid', 'softmax',
        'conv2d', 'depthwiseConv2d', 'maxPool2d', 'avgPool2d',
        'pad', 'permute', 'reshape', 'squeeze',
        'add', 'addRelu', 'upsampleBilinear', 'mulScalar', 'resizeBilinear'
      ];

      const originalMethods = {};
      for (const op of opsToProfile) {
        if (webgpuBackend[op]) {
          originalMethods[op] = webgpuBackend[op].bind(webgpuBackend);
          webgpuBackend[op] = profiler.wrap(webgpuBackend, op, originalMethods[op]);
        }
      }

      // Warmup (5 runs without profiling)
      summaryEl.textContent += '\nWarming up (5 runs)...';
      profiler.enabled = false;
      for (let i = 0; i < 5; i++) {
        const output = torchjs.withBatch(() => torchjs.handLandmarks(testInput, weights));
        await output.handflag.getData();
      }
      profiler.enabled = true;

      // Profile
      summaryEl.textContent += `\nProfiling ${iterations} iterations...`;
      profiler.clear();

      const totalTimes = [];
      const gpuWaitTimes = [];
      const mapAsyncTimes = [];

      for (let i = 0; i < iterations; i++) {
        const t0 = performance.now();
        const output = torchjs.withBatch(() => torchjs.handLandmarks(testInput, weights));
        const t1 = performance.now();

        // Wait for GPU work
        const device = output.handflag.device;
        await device.queue.onSubmittedWorkDone();
        const t2 = performance.now();

        // Read back results
        await torchjs.WebGPUTensor.batchGetData([
          output.handflag,
          output.handedness,
          output.landmarks,
        ]);
        const t3 = performance.now();

        totalTimes.push(t3 - t0);
        gpuWaitTimes.push(t2 - t1);
        mapAsyncTimes.push(t3 - t2);
      }

      // Restore original methods
      for (const op of Object.keys(originalMethods)) {
        webgpuBackend[op] = originalMethods[op];
      }

      // Display results
      const avgTotal = totalTimes.reduce((a, b) => a + b) / totalTimes.length;
      const avgGpuWait = gpuWaitTimes.reduce((a, b) => a + b) / gpuWaitTimes.length;
      const avgMapAsync = mapAsyncTimes.reduce((a, b) => a + b) / mapAsyncTimes.length;
      const avgEncode = avgTotal - avgGpuWait - avgMapAsync;

      summaryEl.innerHTML = `
<strong>Summary (${iterations} iterations):</strong>
Total time: ${avgTotal.toFixed(2)}ms avg (${(1000 / avgTotal).toFixed(0)} FPS)
├── Encode commands: ${avgEncode.toFixed(2)}ms
├── GPU work wait: ${avgGpuWait.toFixed(2)}ms
└── mapAsync (readback): ${avgMapAsync.toFixed(2)}ms

Op-level encode breakdown below...
      `;

      // Op breakdown
      const opSummary = profiler.getSummary();
      const totalOpTime = profiler.getTotalTime() / iterations;  // Per iteration
      const entries = Object.entries(opSummary)
        .sort((a, b) => b[1].total - a[1].total);

      tbodyEl.innerHTML = '';
      for (const [name, stats] of entries) {
        const avgPerIter = stats.total / iterations;
        const avgPerCall = stats.total / stats.count;
        const pct = (avgPerIter / totalOpTime * 100).toFixed(1);
        const barWidth = Math.min(200, Math.max(1, avgPerIter / totalOpTime * 200));

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${name}</td>
          <td>${stats.count / iterations}</td>
          <td>${avgPerIter.toFixed(3)}</td>
          <td>${avgPerCall.toFixed(4)}</td>
          <td>${pct}%</td>
          <td><div class="bar-container"><div class="bar" style="width: ${barWidth}px"></div></div></td>
        `;
        if (parseFloat(pct) > 10) row.classList.add('highlight');
        tbodyEl.appendChild(row);
      }

      // Timeline (first iteration only)
      let timelineText = 'Timeline (first iteration):\n\n';
      let cumulative = 0;
      const firstIterOps = profiler.ops.slice(0, profiler.ops.length / iterations);
      for (const op of firstIterOps) {
        const pct = (op.duration / totalOpTime * 100).toFixed(1);
        timelineText += `${cumulative.toFixed(3).padStart(8)}ms  ${op.name.padEnd(20)}  ${op.duration.toFixed(4)}ms  (${pct}%)\n`;
        cumulative += op.duration;
      }
      timelineEl.textContent = timelineText;
    }

    document.getElementById('runProfile').onclick = () => runProfile(10);
    document.getElementById('runSingle').onclick = () => runProfile(1);

    summaryEl.textContent = 'Ready! Click a button to run profiler.';
  </script>
</body>
</html>
