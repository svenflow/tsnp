<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP16 vs FP32 Benchmark & Correctness Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { color: #fff; }
    .section {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    pre {
      background: #333;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background: #45a049;
    }
    .success { color: #4CAF50; font-weight: bold; }
    .error { color: #f44336; font-weight: bold; }
    .warning { color: #ff9800; font-weight: bold; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    th { background: #333; }
    .metric-row { display: flex; gap: 20px; margin: 10px 0; }
    .metric-box {
      background: #333;
      padding: 15px;
      border-radius: 4px;
      flex: 1;
      text-align: center;
    }
    .metric-value { font-size: 24px; font-weight: bold; }
    .metric-label { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h1>FP16 vs FP32 Comparison</h1>

  <div class="section">
    <h2>Device Info</h2>
    <div id="device-info">Loading...</div>
  </div>

  <div class="section">
    <h2>Controls</h2>
    <button id="runTest" disabled>Run FP16 vs FP32 Test</button>
    <button id="runBenchmark" disabled>Run Benchmark (10 iterations)</button>
  </div>

  <div class="section">
    <h2>Results</h2>
    <div class="metric-row">
      <div class="metric-box">
        <div class="metric-value" id="f32-time">-</div>
        <div class="metric-label">FP32 Time (ms)</div>
      </div>
      <div class="metric-box">
        <div class="metric-value" id="f16-time">-</div>
        <div class="metric-label">FP16 Time (ms)</div>
      </div>
      <div class="metric-box">
        <div class="metric-value" id="speedup">-</div>
        <div class="metric-label">Speedup</div>
      </div>
    </div>
    <div id="correctness-result"></div>
  </div>

  <div class="section">
    <h2>Output Comparison</h2>
    <table id="comparison-table" style="display: none;">
      <thead>
        <tr>
          <th>Output</th>
          <th>FP32</th>
          <th>FP16</th>
          <th>Diff</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="comparison-body"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Console</h2>
    <pre id="console"></pre>
  </div>

  <script type="module">
    const consoleEl = document.getElementById('console');
    let torchjs = null;
    let weights = null;
    let testInput = null;
    let webgpuBackend = null;

    function log(msg) {
      consoleEl.textContent += msg + '\n';
      consoleEl.scrollTop = consoleEl.scrollHeight;
      console.log(msg);
    }

    async function init() {
      try {
        // Check WebGPU and shader-f16
        if (!navigator.gpu) {
          document.getElementById('device-info').innerHTML = '<span class="error">WebGPU not available</span>';
          return;
        }

        const adapter = await navigator.gpu.requestAdapter();
        const hasF16 = adapter.features.has('shader-f16');

        let deviceInfo = `<p><strong>Adapter:</strong> ${adapter.info?.device || 'Unknown'}</p>`;
        deviceInfo += `<p><strong>shader-f16:</strong> ${hasF16 ? '<span class="success">Available</span>' : '<span class="error">Not Available</span>'}</p>`;

        if (!hasF16) {
          deviceInfo += `<p class="warning">FP16 shaders will not be used. Running FP32 only.</p>`;
        }

        document.getElementById('device-info').innerHTML = deviceInfo;

        // Load torchjs
        log('Loading torchjs...');
        torchjs = await import('/packages/torchjs/dist/index.mjs');
        log('Module loaded');

        // Load weights
        log('Loading weights...');
        const [metaRes, binRes, inputRes] = await Promise.all([
          fetch('../../../BlazePalm/ML/converted/weights.json'),
          fetch('../../../BlazePalm/ML/converted/weights.bin'),
          fetch('../../../BlazePalm/ML/test_outputs/test_hand_input.bin'),
        ]);

        const metadata = await metaRes.json();
        const buffer = await binRes.arrayBuffer();
        const inputBuffer = await inputRes.arrayBuffer();

        weights = torchjs.loadWeightsFromBuffer(metadata, buffer);
        testInput = { data: new Float32Array(inputBuffer), shape: [1, 3, 256, 256] };
        log(`Loaded ${Object.keys(weights).length} weight tensors`);

        // Initialize WebGPU backend
        log('Initializing WebGPU backend...');
        webgpuBackend = await torchjs.createWebGPUBackend();
        log(`shader-f16 enabled: ${torchjs.hasF16Support?.() ?? 'unknown'}`);

        // Enable buttons
        document.getElementById('runTest').disabled = false;
        document.getElementById('runBenchmark').disabled = false;

      } catch (e) {
        log(`Error: ${e.message}`);
        console.error(e);
      }
    }

    // Force FP32 by temporarily disabling the flag
    // Note: This requires modifying the backend to support a force-f32 mode
    // For now, we'll just run the model and report what was used

    async function runInference() {
      torchjs.setBackend(webgpuBackend);

      const totalStart = performance.now();
      const encodeStart = performance.now();

      const output = torchjs.withBatch(() => {
        return torchjs.handLandmarks(testInput, weights);
      });

      const encodeEnd = performance.now();

      // Wait for GPU to finish
      const [handflagData, handednessData, landmarksData] = await Promise.all([
        output.handflag.getData(),
        output.handedness.getData(),
        output.landmarks.getData(),
      ]);

      const totalEnd = performance.now();

      return {
        totalTime: totalEnd - totalStart,
        encodeTime: encodeEnd - encodeStart,
        handflag: handflagData[0],
        handedness: handednessData[0],
        landmarks: landmarksData,
      };
    }

    async function runCorrectnessTest() {
      log('\n=== Running FP16 vs FP32 Correctness Test ===');

      // Run inference (uses FP16 if available)
      const result = await runInference();
      log(`Inference time: ${result.totalTime.toFixed(1)}ms`);

      // Reference values from Python
      const pyHandflag = 0.999471;
      const pyHandedness = 0.000005;

      // Calculate diffs
      const handflagDiff = Math.abs(result.handflag - pyHandflag);
      const handednessDiff = Math.abs(result.handedness - pyHandedness);

      // Show comparison table
      const tbody = document.getElementById('comparison-body');
      tbody.innerHTML = '';

      const tolerance = 1e-3;
      const addRow = (name, f32val, val, diff) => {
        const ok = diff < tolerance;
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${name}</td>
          <td>${f32val.toFixed(6)}</td>
          <td>${val.toFixed(6)}</td>
          <td>${diff.toExponential(2)}</td>
          <td>${ok ? '<span class="success">PASS</span>' : '<span class="error">FAIL</span>'}</td>
        `;
        tbody.appendChild(row);
        return ok;
      };

      // Use Python reference as "ground truth"
      const pass1 = addRow('handflag', pyHandflag, result.handflag, handflagDiff);
      const pass2 = addRow('handedness', pyHandedness, result.handedness, handednessDiff);

      // Check first 3 landmarks
      let landmarkPass = true;
      for (let i = 0; i < 3; i++) {
        const ref = [0.46875, 0.78125, 0.58984375][i]; // Approximate Python values
        const diff = Math.abs(result.landmarks[i] - ref);
        landmarkPass = landmarkPass && diff < 0.1; // Loose tolerance for landmarks
      }

      document.getElementById('comparison-table').style.display = 'table';

      const allPass = pass1 && pass2;
      document.getElementById('correctness-result').innerHTML = allPass
        ? '<p class="success">✓ Outputs match reference within tolerance (1e-3)</p>'
        : '<p class="error">✗ Some outputs exceed tolerance</p>';

      log(`handflag: ${result.handflag.toFixed(6)} (ref: ${pyHandflag}, diff: ${handflagDiff.toExponential(2)})`);
      log(`handedness: ${result.handedness.toFixed(6)} (ref: ${pyHandedness}, diff: ${handednessDiff.toExponential(2)})`);
    }

    async function runBenchmark() {
      log('\n=== Running Benchmark (10 iterations) ===');

      // Warmup
      log('Warmup...');
      for (let i = 0; i < 3; i++) {
        await runInference();
      }

      // Benchmark
      const times = [];
      for (let i = 0; i < 10; i++) {
        const result = await runInference();
        times.push(result.totalTime);
        log(`Run ${i + 1}: ${result.totalTime.toFixed(1)}ms`);
      }

      const avg = times.reduce((a, b) => a + b, 0) / times.length;
      const min = Math.min(...times);
      const max = Math.max(...times);
      const fps = 1000 / avg;

      log(`\nResults:`);
      log(`  Avg: ${avg.toFixed(1)}ms (${fps.toFixed(0)} FPS)`);
      log(`  Min: ${min.toFixed(1)}ms | Max: ${max.toFixed(1)}ms`);

      // Update metrics
      const hasF16 = torchjs.hasF16Support?.() ?? false;
      if (hasF16) {
        document.getElementById('f16-time').textContent = avg.toFixed(1);
        // Estimate FP32 time (typically 1.5-2x slower)
        document.getElementById('f32-time').textContent = '-';
        document.getElementById('speedup').textContent = `${fps.toFixed(0)} FPS`;
      } else {
        document.getElementById('f32-time').textContent = avg.toFixed(1);
        document.getElementById('f16-time').textContent = '-';
        document.getElementById('speedup').textContent = `${fps.toFixed(0)} FPS`;
      }

      log(`\nCompared to MediaPipe WebGL (~5ms):`);
      log(`  Ratio: ${(avg / 5).toFixed(1)}x slower`);
    }

    document.getElementById('runTest').onclick = runCorrectnessTest;
    document.getElementById('runBenchmark').onclick = runBenchmark;

    init();
  </script>
</body>
</html>
