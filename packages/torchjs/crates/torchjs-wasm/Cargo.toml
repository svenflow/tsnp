[package]
name = "torchjs-wasm"
version = "0.1.0"
edition = "2021"
authors = ["Sven"]
description = "WebAssembly bindings for torchjs neural network operations"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[dependencies.web-sys]
version = "0.3"
features = ["console"]
