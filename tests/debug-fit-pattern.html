<!DOCTYPE html>
<html>
<head>
  <title>Debug: FIT Shader Pattern Isolation</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    .pass { color: #0f8; }
    .fail { color: #f55; }
    pre { background: #16213e; padding: 15px; border-radius: 8px; white-space: pre-wrap; }
    button { background: #00d9ff; color: #1a1a2e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>
  <h1>Debug: FIT Shader Pattern Isolation</h1>
  <p>Testing specific patterns from the FIT shader to find what breaks</p>
  <button onclick="runTests()">Run All Tests</button>
  <button onclick="runFITTest()">Test Full FIT Shader</button>
  <pre id="output">Click button to run tests...</pre>

  <script type="module">
    let device = null;
    const log = (msg) => { document.getElementById('output').textContent += msg + '\n'; };

    async function init() {
      const adapter = await navigator.gpu.requestAdapter();
      device = await adapter.requestDevice({
        requiredLimits: {
          maxStorageBufferBindingSize: 1024 * 1024 * 1024,
          maxBufferSize: 1024 * 1024 * 1024,
        }
      });
      log('WebGPU initialized: ' + (adapter.name || 'unknown'));
    }

    // Test 1: Double barrier in loop (like FIT shader)
    const SHADER_DOUBLE_BARRIER = `
      @group(0) @binding(0) var<storage, read_write> output: array<f32>;
      var<workgroup> shared: array<f32, 256>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(global_invocation_id) gid: vec3<u32>) {
        let tid = lid.y * 16u + lid.x;
        let g = gid.y * 16u + gid.x;

        var acc: f32 = 0.0;

        // Simulate two tiles
        for (var t: u32 = 0u; t < 2u; t = t + 1u) {
          // Load phase
          shared[tid] = f32(g) + f32(t) * 100.0;
          workgroupBarrier();

          // Compute phase
          acc = acc + shared[tid];
          workgroupBarrier();
        }

        output[g] = acc;
      }
    `;

    // Test 2: Large shared memory (2080 floats like FIT)
    const SHADER_LARGE_SHARED = `
      @group(0) @binding(0) var<storage, read_write> output: array<f32>;
      var<workgroup> shared: array<f32, 2080>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(global_invocation_id) gid: vec3<u32>) {
        let tid = lid.y * 16u + lid.x;
        let g = gid.y * 16u + gid.x;

        // Write to shared
        shared[tid] = f32(g) + 100.0;
        workgroupBarrier();

        // Read from shared
        output[g] = shared[tid];
      }
    `;

    // Test 3: Two shared arrays (As and Bs like FIT)
    const SHADER_TWO_SHARED = `
      @group(0) @binding(0) var<storage, read_write> output: array<f32>;
      var<workgroup> As: array<f32, 2080>;
      var<workgroup> Bs: array<vec4<f32>, 544>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(global_invocation_id) gid: vec3<u32>) {
        let tid = lid.y * 16u + lid.x;
        let g = gid.y * 16u + gid.x;

        // Write to both shared arrays
        As[tid] = f32(g) + 100.0;
        Bs[tid] = vec4<f32>(f32(g) + 200.0);
        workgroupBarrier();

        // Read from both
        output[g] = As[tid] + Bs[tid].x;
      }
    `;

    // Test 4: FIT-style indexing with constants
    const SHADER_FIT_INDEXING = `
      @group(0) @binding(0) var<storage, read_write> output: array<f32>;
      const BLOCK_M_PADDED: u32 = 65u;
      var<workgroup> As: array<f32, 2080>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(global_invocation_id) gid: vec3<u32>) {
        let tid = lid.y * 16u + lid.x;
        let g = gid.y * 16u + gid.x;

        // FIT-style indexing: k * BLOCK_M_PADDED + row
        for (var i: u32 = 0u; i < 8u; i = i + 1u) {
          let loadIdx = tid * 8u + i;
          let loadK = loadIdx / 64u;
          let loadRow = loadIdx % 64u;
          As[loadK * BLOCK_M_PADDED + loadRow] = f32(loadIdx);
        }
        workgroupBarrier();

        // Read back first row
        output[g] = As[g % 64u];
      }
    `;

    // Test 5: Actual simplified FIT structure
    const SHADER_SIMPLIFIED_FIT = `
      struct Uniforms { M: u32, K: u32, N: u32, NPadded: u32, }
      const BLOCK_M: u32 = 64u;
      const BLOCK_K: u32 = 32u;
      const BLOCK_M_PADDED: u32 = 65u;

      @group(0) @binding(0) var<uniform> uniforms: Uniforms;
      @group(0) @binding(1) var<storage, read> A: array<f32>;
      @group(0) @binding(2) var<storage, read_write> C: array<f32>;
      var<workgroup> As: array<f32, 2080>;

      @compute @workgroup_size(16, 16)
      fn main(@builtin(local_invocation_id) lid: vec3<u32>, @builtin(workgroup_id) wid: vec3<u32>) {
        let K = uniforms.K;
        let tx = lid.x;
        let ty = lid.y;
        let tid = ty * 16u + tx;

        var acc: f32 = 0.0;
        let numTiles = K / BLOCK_K;

        for (var t: u32 = 0u; t < numTiles; t = t + 1u) {
          // Load A tile
          for (var i: u32 = 0u; i < 8u; i = i + 1u) {
            let loadIdx = tid * 8u + i;
            let loadK = loadIdx / BLOCK_M;
            let loadRow = loadIdx % BLOCK_M;
            let globalK = t * BLOCK_K + loadK;
            let globalRow = wid.y * BLOCK_M + loadRow;
            As[loadK * BLOCK_M_PADDED + loadRow] = A[globalRow * K + globalK];
          }
          workgroupBarrier();

          // Accumulate (simplified - just sum first few elements)
          let aRowBase = ty * 4u;
          for (var k: u32 = 0u; k < BLOCK_K; k = k + 1u) {
            acc = acc + As[k * BLOCK_M_PADDED + aRowBase];
          }
          workgroupBarrier();
        }

        let outRow = wid.y * BLOCK_M + ty * 4u;
        let outCol = wid.x * 64u + tx;
        C[outRow * uniforms.N + outCol] = acc;
      }
    `;

    async function runShader(name, code, outputSize = 256) {
      const outBuffer = device.createBuffer({
        size: outputSize * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      const module = device.createShaderModule({ code });
      const pipeline = device.createComputePipeline({
        layout: 'auto',
        compute: { module, entryPoint: 'main' },
      });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [{ binding: 0, resource: { buffer: outBuffer } }],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(1, 1);
      pass.end();

      const staging = device.createBuffer({
        size: outputSize * 4,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(outBuffer, 0, staging, 0, outputSize * 4);
      device.queue.submit([commandEncoder.finish()]);
      await staging.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(staging.getMappedRange().slice(0));
      staging.unmap();
      outBuffer.destroy();
      staging.destroy();

      const first10 = Array.from(result.slice(0, 10));
      const hasNonZero = first10.some(v => v !== 0);
      const status = hasNonZero ? 'PASS' : 'FAIL';
      log(`${name}: [${first10.map(v => v.toFixed(1)).join(', ')}] - ${status}`);
      return hasNonZero;
    }

    async function runSimplifiedFIT() {
      log('\n--- Testing Simplified FIT ---');

      const M = 64, K = 64, N = 64;

      // Create buffers
      const uniformBuffer = device.createBuffer({
        size: 16,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(uniformBuffer, 0, new Uint32Array([M, K, N, N]));

      const aData = new Float32Array(M * K);
      for (let i = 0; i < M * K; i++) aData[i] = (i % 17) * 0.1;

      const aBuffer = device.createBuffer({
        size: aData.byteLength,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(aBuffer, 0, aData);

      const cBuffer = device.createBuffer({
        size: M * N * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });

      const module = device.createShaderModule({ code: SHADER_SIMPLIFIED_FIT });
      const pipeline = device.createComputePipeline({
        layout: 'auto',
        compute: { module, entryPoint: 'main' },
      });

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: { buffer: uniformBuffer } },
          { binding: 1, resource: { buffer: aBuffer } },
          { binding: 2, resource: { buffer: cBuffer } },
        ],
      });

      const commandEncoder = device.createCommandEncoder();
      const pass = commandEncoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(1, 1);
      pass.end();

      const staging = device.createBuffer({
        size: M * N * 4,
        usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
      });
      commandEncoder.copyBufferToBuffer(cBuffer, 0, staging, 0, M * N * 4);
      device.queue.submit([commandEncoder.finish()]);
      await staging.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(staging.getMappedRange().slice(0));
      staging.unmap();

      uniformBuffer.destroy();
      aBuffer.destroy();
      cBuffer.destroy();
      staging.destroy();

      const first10 = Array.from(result.slice(0, 10));
      const hasNonZero = first10.some(v => v !== 0);
      log(`Simplified FIT: [${first10.map(v => v.toFixed(3)).join(', ')}] - ${hasNonZero ? 'PASS' : 'FAIL'}`);
    }

    window.runTests = async function() {
      document.getElementById('output').textContent = '';
      log('Initializing WebGPU...');
      await init();
      log('');
      log('=== Testing FIT Shader Patterns ===');
      log('');

      await runShader('Double barrier in loop', SHADER_DOUBLE_BARRIER);
      await runShader('Large shared (2080)', SHADER_LARGE_SHARED);
      await runShader('Two shared arrays', SHADER_TWO_SHARED);
      await runShader('FIT-style indexing', SHADER_FIT_INDEXING);

      await runSimplifiedFIT();

      log('');
      log('=== Done ===');
    };

    window.runFITTest = async function() {
      document.getElementById('output').textContent = '';
      log('Initializing WebGPU...');
      await init();
      await runSimplifiedFIT();
    };
  </script>
</body>
</html>
